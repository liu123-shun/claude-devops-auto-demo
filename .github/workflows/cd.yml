# ============================================================
# CD — 持续部署 (push to master 时自动触发)
# Docker 构建 + 推送至 GitHub Packages + Docker Hub
# ============================================================
name: CD

on:
  push:
    branches: [master]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE_NAME: library-manage-system

jobs:
  # ==========================================================
  # 先跑 CI 保障质量
  # ==========================================================
  ci-check:
    name: CI Check
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: library_manage
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -p123456"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint>=3.0 pytest>=8.0 httpx>=0.27.0

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -p123456 --silent; then
              echo "MySQL is ready"; break
            fi
            echo "Waiting for MySQL... ($i)"; sleep 2
          done

      - name: Pylint & Pytest
        env:
          DATABASE_URL: mysql+pymysql://root:123456@127.0.0.1:3306/library_manage?charset=utf8mb4
        run: |
          pylint src/ --fail-under=6.0 || echo "Pylint done"
          pytest tests/ -v --tb=short

  # ==========================================================
  # 测试通过后，构建并推送 Docker 镜像
  # ==========================================================
  docker-build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: ci-check
    if: success()

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          echo "=== 构建 Docker 镜像 ==="
          docker build \
            --build-arg PIP_INDEX_URL=https://mirrors.aliyun.com/pypi/simple/ \
            -t ${{ env.DOCKER_IMAGE_NAME }}:latest \
            .

      - name: Verify Import
        run: |
          docker run --rm ${{ env.DOCKER_IMAGE_NAME }}:latest \
            python -c "from src.main import app; print('模块导入成功')"

      # ---- 推送到 GitHub Packages (ghcr.io) — 总是推送，无需任何配置 ----
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GitHub Packages
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}
          IMAGE_ID=$(echo $IMAGE_ID | tr '[:upper:]' '[:lower:]')
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:latest ${IMAGE_ID}:latest
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:latest ${IMAGE_ID}:${COMMIT_SHORT}
          docker push ${IMAGE_ID}:latest
          docker push ${IMAGE_ID}:${COMMIT_SHORT}
          echo "GitHub Packages: ${IMAGE_ID}:latest"
