name: CI/CD Pipeline

# ============================================================
# 触发条件
# ============================================================
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# ============================================================
# 全局环境变量
# ============================================================
env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE_NAME: user-service

jobs:
  # ==========================================================
  # 任务1：代码规范检查 + 单元测试
  # ==========================================================
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      # 1.1 拉取仓库代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1.2 配置 Python 3.11 环境
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # 1.3 安装项目依赖 + pylint
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint>=3.0

      # 1.4 运行 Pylint 代码规范检查
      - name: Run Pylint
        run: |
          echo "=== Pylint 代码规范检查 ==="
          pylint src/ --fail-under=7.0
        continue-on-error: false

      # 1.5 运行 Pytest 单元测试
      - name: Run Pytest
        run: |
          echo "=== Pytest 单元测试 ==="
          pytest tests/ -v --tb=short

  # ==========================================================
  # 任务2：构建 Docker 镜像（仅当 lint-test 全部通过后执行）
  # ==========================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-test           # 依赖 lint-test 成功后才运行
    if: success()              # 前一任务全部通过

    steps:
      # 2.1 拉取仓库代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2.2 构建 Docker 镜像（不推送，仅验证构建成功）
      - name: Build Docker Image
        run: |
          echo "=== 构建 Docker 镜像: ${{ env.DOCKER_IMAGE_NAME }} ==="
          docker build \
            --build-arg PIP_INDEX_URL=https://mirrors.aliyun.com/pypi/simple/ \
            -t ${{ env.DOCKER_IMAGE_NAME }}:latest \
            .

      # 2.3 (可选) 验证镜像内模块导入正常
      - name: Verify Import
        run: |
          echo "=== 验证容器内 src 模块可导入 ==="
          docker run --rm ${{ env.DOCKER_IMAGE_NAME }}:latest \
            python -c "from src.user_service import UserService; print('✅ 模块导入成功')"
