name: CI/CD Pipeline

# ============================================================
# 触发条件：master 分支 push / PR
# ============================================================
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# ============================================================
# 全局环境变量
# ============================================================
env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE_NAME: library-manage-system

jobs:
  # ==========================================================
  # 任务1：代码规范检查 + 单元测试
  # ==========================================================
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      # 启动临时 MySQL 8.0 测试容器
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: library_manage
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -p123456"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      # 1.1 拉取仓库代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1.2 配置 Python 3.11 环境
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # 1.3 安装项目依赖 + pylint + pytest
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint>=3.0 pytest>=8.0 httpx>=0.27.0

      # 1.4 等待 MySQL 就绪
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -p123456 --silent; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i)"
            sleep 2
          done

      # 1.5 Pylint 代码规范检查
      - name: Run Pylint
        run: |
          echo "=== Pylint 代码规范检查 ==="
          pylint src/ --fail-under=6.0 || echo "Pylint 检查完成（允许部分警告）"

      # 1.6 Pytest 单元测试
      - name: Run Pytest
        env:
          DATABASE_URL: mysql+pymysql://root:123456@127.0.0.1:3306/library_manage?charset=utf8mb4
        run: |
          echo "=== Pytest 单元测试 ==="
          pytest tests/ -v --tb=short

  # ==========================================================
  # 任务2：构建 Docker 镜像（仅当 lint-test 全部通过后执行）
  # ==========================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-test
    if: success()

    steps:
      # 2.1 拉取仓库代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2.2 构建 Docker 镜像（不推送，仅验证构建成功）
      - name: Build Docker Image
        run: |
          echo "=== 构建 Docker 镜像: ${{ env.DOCKER_IMAGE_NAME }} ==="
          docker build \
            --build-arg PIP_INDEX_URL=https://mirrors.aliyun.com/pypi/simple/ \
            -t ${{ env.DOCKER_IMAGE_NAME }}:latest \
            .

      # 2.3 验证镜像内模块导入正常
      - name: Verify Import
        run: |
          echo "=== 验证容器内 src 模块可导入 ==="
          docker run --rm ${{ env.DOCKER_IMAGE_NAME }}:latest \
            python -c "from src.main import app; print('✅ 模块导入成功')"
