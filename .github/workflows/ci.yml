# ============================================================
# CI — 持续集成（每次 push/PR 都跑）
# 代码规范检查 + 单元测试
# ============================================================
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: library_manage
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -p123456"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint>=3.0 pytest>=8.0 httpx>=0.27.0

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -p123456 --silent; then
              echo "MySQL is ready"; break
            fi
            echo "Waiting for MySQL... ($i)"; sleep 2
          done

      - name: Run Pylint
        run: |
          echo "=== Pylint 代码规范检查 ==="
          pylint src/ --fail-under=6.0 || echo "Pylint 检查完成（允许部分警告）"

      - name: Run Pytest
        env:
          DATABASE_URL: mysql+pymysql://root:123456@127.0.0.1:3306/library_manage?charset=utf8mb4
        run: |
          echo "=== Pytest 单元测试 ==="
          pytest tests/ -v --tb=short
