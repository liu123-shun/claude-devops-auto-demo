# ============================================================
# 图书借阅管理系统 — Docker 双容器编排
#   - mysql:    MySQL 8.0 数据库（持久化数据卷）
#   - backend:  FastAPI 后端服务（端口 5000）
# ============================================================
services:

  # ---- MySQL 8.0 数据库容器 ----
  mysql:
    image: mysql:8.0
    container_name: library_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: library_manage
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---- FastAPI 后端服务容器 ----
  backend:
    build:
      context: .
      args:
        PIP_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
    container_name: library_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: mysql+pymysql://root:root123456@mysql:3306/library_manage?charset=utf8mb4
      SECRET_KEY: library-manage-secret-key-2024-jwt
      PYTHONPATH: /app
    volumes:
      - ./frontend:/app/frontend:ro

volumes:
  mysql_data:
