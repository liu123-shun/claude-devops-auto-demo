# ============================================================
# 图书借阅管理系统 — Docker 单容器编排（连接 Windows 本机 MySQL）
#
# 前置条件：
#   1. Windows 本机安装 MySQL 8.0，创建 library_manage 数据库
#   2. MySQL 账号 root / 密码 123456
#   3. 开放 3306 端口防火墙访问
#
# 若仍需 Docker 内置 MySQL（避免 3306 端口冲突）：
#   取消下方 mysql 服务注释，将端口映射改为 3307:3306，
#   并将 backend 的 DATABASE_URL 中 host 改为 mysql
# ============================================================
services:

  # ---- 【可选】MySQL 8.0 数据库容器（取消注释即可启用） ----
  # 使用容器 MySQL 时将端口映射改为 3307:3306 规避本机 3306 冲突
  #
  # mysql:
  #   image: mysql:8.0
  #   container_name: library_mysql
  #   restart: always
  #   environment:
  #     MYSQL_ROOT_PASSWORD: 123456
  #     MYSQL_DATABASE: library_manage
  #     MYSQL_CHARSET: utf8mb4
  #     MYSQL_COLLATION: utf8mb4_unicode_ci
  #   ports:
  #     - "3307:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   command:
  #     - --character-set-server=utf8mb4
  #     - --collation-server=utf8mb4_unicode_ci
  #     - --default-authentication-plugin=mysql_native_password
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 30s

  # ---- FastAPI 后端服务容器 ----
  backend:
    build:
      context: .
      args:
        PIP_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
    container_name: library_backend
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5000:5000"
    environment:
      # 连接 Windows 本机 MySQL（host.docker.internal 指向宿主机）
      DATABASE_URL: mysql+pymysql://root:123456@host.docker.internal:3306/library_manage?charset=utf8mb4
      SECRET_KEY: library-manage-secret-key-2024-jwt
      PYTHONPATH: /app
    volumes:
      - ./frontend:/app/frontend:ro

# 若启用容器 MySQL，取消下方注释
# volumes:
#   mysql_data:
