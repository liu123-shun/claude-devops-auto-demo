<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公告管理 — 管理后台</title>
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>
<div class="topbar">
  <div class="logo">📚 图书借阅管理系统 · 管理后台</div>
  <div class="user-info"><span>👤 <span id="display-name">管理员</span></span><button onclick="logout()">退出登录</button></div>
</div>
<div class="sidebar" id="sidebar"></div>
<div class="main-content">
  <div class="breadcrumb">🏠 首页 / 公告管理</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="card-title" style="margin-bottom:0;">📢 系统公告</div>
      <button class="btn btn-primary" onclick="openAddModal()">＋ 发布公告</button>
    </div>
    <div class="table-wrap"><table><thead><tr><th>ID</th><th>标题</th><th>发布人</th><th>置顶</th><th>发布时间</th><th>操作</th></tr></thead><tbody id="tbody"></tbody></table></div>
    <div id="empty-state" class="empty-state" style="display:none;">暂无公告</div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<div class="modal-overlay" id="ann-modal">
  <div class="modal" style="width:560px;">
    <div class="modal-header"><span id="modal-title">发布公告</span><button class="modal-close" onclick="closeModal('ann-modal')">&times;</button></div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-group"><label>标题 *</label><input type="text" id="f-title"></div>
      <div class="form-group"><label>内容 *</label><textarea id="f-content" rows="5" style="width:100%;border:1px solid #dce3ea;border-radius:8px;padding:8px;font-size:13px;"></textarea></div>
      <div class="form-group"><label><input type="checkbox" id="f-pinned" value="1"> 置顶公告</label></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('ann-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveAnnouncement()">发布</button>
    </div>
  </div>
</div>

<script src="app.js?v=2"></script>
<script>
const user = checkAuth();
if (!user || user.role !== "admin") { alert("仅管理员可访问"); window.location.href = "login.html"; }
displayUserInfo();
renderSidebar("admin");

function loadList(page=1) {
  apiGet(`/api/admin/announcements?page=${page}&page_size=10`).then(data => {
    if (!data) return;
    const tbody = document.getElementById("tbody");
    const empty = document.getElementById("empty-state");
    if (!data.items || data.items.length===0) { tbody.innerHTML=""; empty.style.display="block"; }
    else {
      empty.style.display="none";
      tbody.innerHTML = data.items.map(a => `
        <tr>
          <td>${a.id}</td>
          <td><strong>${a.title}</strong>${a.is_pinned?' <span class="tag tag-red">置顶</span>':''}</td>
          <td>${a.publisher_name||"-"}</td>
          <td>${a.is_pinned?'✅':'—'}</td>
          <td>${(a.create_time||"").slice(0,10)}</td>
          <td>
            <button class="btn btn-outline btn-sm" onclick='editAnn(${JSON.stringify(a).replace(/'/g,"&#39;")})'>编辑</button>
            <button class="btn btn-danger btn-sm" onclick='deleteAnn(${a.id})'>删除</button>
          </td>
        </tr>`).join("");
    }
    renderPagination("pagination", data.page, data.total_pages, loadList);
  });
}

function openAddModal() {
  document.getElementById("modal-title").textContent="发布公告";
  document.getElementById("edit-id").value="";
  document.getElementById("f-title").value="";
  document.getElementById("f-content").value="";
  document.getElementById("f-pinned").checked=false;
  openModal("ann-modal");
}

function editAnn(a) {
  document.getElementById("modal-title").textContent="编辑公告";
  document.getElementById("edit-id").value=a.id;
  document.getElementById("f-title").value=a.title;
  document.getElementById("f-content").value=a.content;
  document.getElementById("f-pinned").checked=a.is_pinned===1;
  openModal("ann-modal");
}

async function saveAnnouncement() {
  const id = document.getElementById("edit-id").value;
  const title = document.getElementById("f-title").value.trim();
  const content = document.getElementById("f-content").value.trim();
  const isPinned = document.getElementById("f-pinned").checked?1:0;
  if (!title||!content) { alert("标题和内容不能为空"); return; }

  const body = JSON.stringify({title, content, is_pinned: isPinned});
  let url, method;
  if (id) { url = `/api/admin/announcements/${id}`; method = "PUT"; }
  else { url = "/api/admin/announcements"; method = "POST"; }

  const res = await fetch(url, {method, headers:{"Content-Type":"application/json","Authorization":"Bearer "+getToken()}, body});
  if (res.ok) { closeModal("ann-modal"); loadList(); }
  else { const d=await res.json(); alert(d.detail||"操作失败"); }
}

async function deleteAnn(id) {
  if (!confirm("确定删除该公告？")) return;
  await apiDelete(`/api/admin/announcements/${id}`);
  loadList();
}

loadList();
</script>
</body>
</html>
