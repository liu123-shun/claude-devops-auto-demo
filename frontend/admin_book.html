<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图书管理 — 管理后台</title>
<link rel="stylesheet" href="style.css?v=4">
</head>
<body>
<div class="topbar">
  <div class="logo">📚 图书借阅管理系统 · 管理后台</div>
  <div class="user-info"><span>👤 <span id="display-name">管理员</span></span><button onclick="logout()">退出登录</button></div>
</div>
<div class="sidebar" id="sidebar"></div>
<div class="main-content">
  <div class="breadcrumb">🏠 首页 / 图书管理</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="toolbar" style="margin-bottom:0;">
        <input type="text" id="search-input" placeholder="🔍 搜索书名/作者/ISBN...">
        <select id="filter-category">
          <option value="">全部分类</option><option value="文学">文学</option><option value="科技">科技</option>
          <option value="历史">历史</option><option value="教育">教育</option><option value="计算机">计算机</option><option value="其他">其他</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="searchBooks()">搜索</button><button class="btn btn-outline btn-sm" onclick="exportBooksCSV()">📥 导出CSV</button>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">+ 新增图书</button>
      <button class="btn btn-outline btn-sm" onclick="openImportBookModal()">📥 批量导入</button>
    </div>
    <div class="table-wrap"><table><thead><tr><th>ID</th><th>书名</th><th>作者</th><th>分类</th><th>ISBN</th><th>库存</th><th>借阅</th><th>操作</th></tr></thead><tbody id="book-tbody"></tbody></table></div>
    <div id="empty-state" class="empty-state" style="display:none;">暂无图书数据</div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<div class="modal-overlay" id="book-modal">
  <div class="modal" style="width:560px;">
    <div class="modal-header"><span id="modal-title">新增图书</span><button class="modal-close" onclick="closeModal('book-modal')">&times;</button></div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px;">
        <div class="form-group"><label>书名 *</label><input type="text" id="f-book-name"></div>
        <div class="form-group"><label>作者 *</label><input type="text" id="f-author"></div>
        <div class="form-group"><label>分类</label><select id="f-category"><option value="">请选择</option><option value="文学">文学</option><option value="科技">科技</option><option value="历史">历史</option><option value="教育">教育</option><option value="计算机">计算机</option><option value="其他">其他</option></select></div>
        <div class="form-group"><label>ISBN</label><input type="text" id="f-isbn"></div>
        <div class="form-group"><label>出版社</label><input type="text" id="f-publisher"></div>
        <div class="form-group"><label>库存 *</label><input type="number" id="f-stock" value="1" min="0"></div>
      </div>
      <div class="form-group"><label>封面图片URL</label><input type="text" id="f-cover" placeholder="可选，粘贴图片链接"></div>
      <div class="form-group"><label>简介</label><textarea id="f-desc" rows="2" style="width:100%;border:1px solid #dce3ea;border-radius:8px;padding:8px;font-size:13px;"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('book-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveBook()">保存</button>
    </div>
  </div>
</div>

<!-- 导入弹窗 -->
<div class="modal-overlay" id="import-book-modal">
  <div class="modal" style="width:560px;">
    <div class="modal-header">📥 批量导入图书<button class="modal-close" onclick="closeModal('import-book-modal')">&times;</button></div>
    <div class="modal-body">
      <div style="margin-bottom:12px;">
        <a href="#" onclick="downloadBookTemplate()" style="color:#4a90d9;font-size:12px;">📄 下载CSV模板</a>
        <span style="color:#999;font-size:11px;margin-left:8px;">表头: book_name,author,category,isbn,publisher,description,stock</span>
      </div>
      <div class="form-group"><label>选择CSV文件</label><input type="file" id="book-import-file" accept=".csv" style="padding:6px;"></div>
      <div id="import-book-error" class="login-error"></div>
      <div id="import-book-result" style="display:none;background:#e8f5e9;color:#2e7d32;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:8px;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('import-book-modal')">取消</button>
      <button class="btn btn-primary" onclick="importBooks()">开始导入</button>
    </div>
  </div>
</div>

<!-- 图书详情弹窗 -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" style="width:600px;max-height:85vh;">
    <div class="modal-header">📖 图书详情<button class="modal-close" onclick="closeModal('detail-modal')">&times;</button></div>
    <div class="modal-body" id="detail-content"></div>
  </div>
</div>

<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <div class="modal-header">⚠️ 确认删除<button class="modal-close" onclick="closeModal('delete-modal')">&times;</button></div>
    <div class="modal-body"><p>确定要删除图书 <strong id="del-book-name"></strong> ?</p></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('delete-modal')">取消</button><button class="btn btn-danger" id="del-confirm-btn">确认删除</button></div>
  </div>
</div>

<script src="app.js?v=4"></script>
<script>
const user = checkAuth();
if (!user || user.role !== "admin") { alert("仅管理员可访问"); window.location.href = "login.html"; }
displayUserInfo();
renderSidebar("admin");
var allBooksData = [];
let currentPage = 1;

function searchBooks(page=1) {
  currentPage=page;
  const kw=document.getElementById("search-input").value.trim();
  const cat=document.getElementById("filter-category").value;
  let url=`/api/admin/books?page=${page}&page_size=10`;
  if(kw) url+=`&keyword=${encodeURIComponent(kw)}`;
  if(cat) url+=`&category=${encodeURIComponent(cat)}`;
  apiGet(url).then(data=>{
  allBooksData = (data.items || []);
    if(!data) return;
    const tbody=document.getElementById("book-tbody");
    const empty=document.getElementById("empty-state");
    if(!data.items||data.items.length===0){tbody.innerHTML="";empty.style.display="block";}
    else{
      empty.style.display="none";
      tbody.innerHTML=data.items.map(b=>`
        <tr style="${b.stock<=0?'opacity:0.45;background:#f5f5f5;':''}">
          <td>${b.id}</td>
          <td><strong>${b.book_name}</strong>${b.stock<=0?' <span class="tag tag-red">已借完</span>':''}</td>
          <td>${b.author}</td>
          <td>${b.category||"-"}</td>
          <td style="font-size:11px;">${b.isbn||"-"}</td>
          <td><span style="color:${b.stock<=0?'#aaa':b.stock<=3?'#e74c3c':'#27ae60'};font-weight:700;">${b.stock}</span></td>
          <td style="font-size:12px;">${b.total_borrows||0}次</td>
          <td>
            <button class="btn btn-outline btn-sm" onclick='viewDetail(${b.id})'>详情</button>
            <button class="btn btn-outline btn-sm" onclick='openEditModal(${JSON.stringify(b).replace(/'/g,"&#39;")})'>编辑</button>
            <button class="btn btn-danger btn-sm" onclick='confirmDelete(${b.id},"${b.book_name}")'>删除</button>
          </td>
        </tr>`).join("");
    }
    renderPagination("pagination",data.page,data.total_pages,searchBooks);
  });
}

async function viewDetail(id) {
  const data = await apiGet(`/api/admin/books/${id}`);
  if (!data) return;
  document.getElementById("detail-content").innerHTML = `
    <h3>${data.book_name}</h3>
    ${data.avg_rating>0?`<div style="font-size:20px;margin:4px 0;">${'★'.repeat(Math.round(data.avg_rating))}${'☆'.repeat(5-Math.round(data.avg_rating))} <span style="font-size:14px;color:#f39c12;font-weight:700;">${data.avg_rating}</span> <span style="font-size:12px;color:#6b8299;">(${data.review_count}条评价)</span></div>`:'<div style="font-size:12px;color:#999;">暂无评分</div>'}
    <table style="margin-top:10px;">
      <tr><td style="color:#6b8299;width:80px;">作者</td><td>${data.author}</td></tr>
      <tr><td style="color:#6b8299;">分类</td><td>${data.category||"-"}</td></tr>
      <tr><td style="color:#6b8299;">ISBN</td><td>${data.isbn||"-"}</td></tr>
      <tr><td style="color:#6b8299;">出版社</td><td>${data.publisher||"-"}</td></tr>
      <tr><td style="color:#6b8299;">库存</td><td><strong>${data.stock}</strong></td></tr>
      <tr><td style="color:#6b8299;">累计借阅</td><td>${data.total_borrows} 次</td></tr>
      <tr><td style="color:#6b8299;">入库时间</td><td>${(data.create_time||"").slice(0,10)}</td></tr>
    </table>
    ${data.description?`<p style="margin-top:12px;color:#555;font-size:13px;">📝 ${data.description}</p>`:''}
    ${data.cover_url?`<img src="${data.cover_url}" style="max-width:120px;margin-top:8px;border-radius:6px;" onerror="this.style.display='none'">`:''}
    <div style="margin-top:14px;"><strong>💬 评价</strong></div>
    <div style="max-height:150px;overflow-y:auto;font-size:12px;">${(data.reviews||[]).length?data.reviews.map(rv=>`<div style="padding:4px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:6px;"><span style="color:#f39c12;">${'★'.repeat(rv.rating)}</span> <strong>${rv.user_name}</strong>${rv.comment?` <span style="color:#555;">\"${rv.comment}\"</span>`:''}<span style="color:#999;font-size:10px;margin-left:auto;">${(rv.create_time||'').slice(0,10)}</span><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteReview(${rv.id},${data.id})" style="padding:1px 6px;font-size:10px;margin-left:4px;" title="删除此评价">✕</button></div>`).join(""):'<span style="color:#999;">暂无评价</span>'}</div>
    <div style="margin-top:14px;"><strong>最近借阅记录</strong></div>
    <div style="font-size:12px;margin-top:6px;">${(data.recent_records||[]).map(r=>`<div style="padding:4px 0;border-bottom:1px solid #f0f0f0;">${r.student_name||"-"} ${r.status==='returned'?'归还':'借阅'} · ${(r.borrow_time||"").replace("T"," ").slice(0,16)}</div>`).join("")||'<span style="color:#999;">暂无</span>'}</div>
  `;
  openModal("detail-modal");
}

async function deleteReview(reviewId, bookId) {
  if (!confirm("确定删除该评价？")) return;
  await apiDelete(`/api/admin/reviews/${reviewId}`);
  viewDetail(bookId);
}

function openAddModal() {
  document.getElementById("modal-title").textContent="新增图书";
  ["edit-id","f-book-name","f-author","f-isbn","f-publisher","f-cover","f-desc"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("f-category").value="";
  document.getElementById("f-stock").value="1";
  openModal("book-modal");
}

function openEditModal(b) {
  document.getElementById("modal-title").textContent="编辑图书";
  document.getElementById("edit-id").value=b.id;
  document.getElementById("f-book-name").value=b.book_name;
  document.getElementById("f-author").value=b.author;
  document.getElementById("f-category").value=b.category||"";
  document.getElementById("f-isbn").value=b.isbn||"";
  document.getElementById("f-publisher").value=b.publisher||"";
  document.getElementById("f-cover").value=b.cover_url||"";
  document.getElementById("f-desc").value=b.description||"";
  document.getElementById("f-stock").value=b.stock;
  openModal("book-modal");
}

async function saveBook() {
  const id=document.getElementById("edit-id").value;
  const data={
    book_name:document.getElementById("f-book-name").value.trim(),
    author:document.getElementById("f-author").value.trim(),
    category:document.getElementById("f-category").value||null,
    isbn:document.getElementById("f-isbn").value.trim()||null,
    publisher:document.getElementById("f-publisher").value.trim()||null,
    description:document.getElementById("f-desc").value.trim()||null,
    cover_url:document.getElementById("f-cover").value.trim()||null,
    stock:parseInt(document.getElementById("f-stock").value)||0,
  };
  if(!data.book_name||!data.author){alert("书名和作者不能为空");return;}
  let result = id? await apiPut(`/api/admin/books/${id}`,data) : await apiPost("/api/admin/books",data);
  if(result&&result.id){closeModal("book-modal");searchBooks(currentPage);}
}

function confirmDelete(id,name) {
  document.getElementById("del-book-name").textContent=name;
  document.getElementById("del-confirm-btn").onclick=async()=>{await apiDelete(`/api/admin/books/${id}`);closeModal("delete-modal");searchBooks(currentPage);};
  openModal("delete-modal");
}

searchBooks();

function exportBooksCSV() {
    if (!allBooksData.length) { alert("暂无数据可导出"); return; }
    exportCSV("图书列表", ["ID","书名","作者","分类","ISBN","出版社","库存","借阅次数","入库时间"],
        allBooksData.map(function(b){ return [b.id,b.book_name,b.author,b.category||"",b.isbn||"",b.publisher||"",b.stock,b.total_borrows||0,(b.create_time||"").slice(0,10)]; }));
}

function openImportBookModal(){
  document.getElementById("import-book-error").style.display="none";
  document.getElementById("import-book-result").style.display="none";
  document.getElementById("book-import-file").value="";
  openModal("import-book-modal");
}

function downloadBookTemplate(){
  var bom="﻿";
  var csv=bom+"book_name,author,category,isbn,publisher,description,stock\n";
  csv+="Python高级编程,李华,计算机,9787111555292,机械工业出版社,进阶读物,5\n";
  csv+="数据结构,王明,计算机,9787302517875,清华大学出版社,经典教材,8\n";
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  var a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="图书导入模板.csv"; a.click();
}

async function importBooks(){
  var fileEl=document.getElementById("book-import-file");
  var errEl=document.getElementById("import-book-error");
  var resultEl=document.getElementById("import-book-result");
  errEl.style.display="none"; resultEl.style.display="none";
  var file=fileEl.files[0];
  if(!file){errEl.textContent="请选择CSV文件";errEl.style.display="block";return;}
  var formData=new FormData(); formData.append("file",file);
  try{
    var res=await fetch("/api/admin/books/import",{method:"POST",headers:{Authorization:"Bearer "+getToken()},body:formData});
    var data=await res.json();
    if(res.ok){
      resultEl.textContent=data.message+(data.errors&&data.errors.length?" 注意: "+data.errors.join("; "):"");
      resultEl.style.display="block";
      searchBooks(1);
    }else{errEl.textContent=data.detail||"导入失败";errEl.style.display="block";}
  }catch(e){errEl.textContent="网络连接失败";errEl.style.display="block";}
}

</script>
</body>
</html>
