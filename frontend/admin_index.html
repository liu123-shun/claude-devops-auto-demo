<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 — 首页看板</title>
<link rel="stylesheet" href="style.css?v=2">
<style>
.dashboard-grid { display:grid; grid-template-columns: 2fr 1fr; gap:20px; }
.card-full { grid-column: 1/-1; }
.hot-book-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #f0f0f0; font-size:13px; }
.hot-book-item:last-child { border-bottom:none; }
.activity-item { padding:6px 0; font-size:13px; border-bottom:1px solid #f5f5f5; }
.category-bar { display:flex; align-items:center; gap:8px; margin:4px 0; }
.category-bar .bar-label { width:60px; font-size:12px; text-align:right; color:#6b8299; }
.category-bar .bar-fill { flex:1; height:18px; background:#e8f0fe; border-radius:4px; overflow:hidden; }
.category-bar .bar-inner { height:100%; background:linear-gradient(90deg,#4a90d9,#6db3f2); border-radius:4px; transition:width .5s; }
.changepw-btn { cursor:pointer; font-size:12px; color:#4a90d9; margin-left:10px; }
.pinned { color:#e74c3c; font-weight:700; }
@media(max-width:900px){.dashboard-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">📚 图书借阅管理系统 · 管理后台</div>
  <div class="user-info">
    <span>👤 <span id="display-name">管理员</span></span>
    <span id="display-role">管理员</span>
    <span class="changepw-btn" onclick="openPwdModal()">🔑 改密</span>
    <button onclick="logout()">退出登录</button>
  </div>
</div>

<div class="sidebar" id="sidebar"></div>
<div class="main-content">
  <div class="breadcrumb">🏠 首页 / 数据看板</div>

  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-value" id="stat-books">-</div><div class="stat-label">总图书</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-students">-</div><div class="stat-label">学生人数</div></div>
    <div class="stat-card warning"><div class="stat-value" id="stat-active">-</div><div class="stat-label">在借图书</div></div>
    <div class="stat-card danger"><div class="stat-value" id="stat-overdue">-</div><div class="stat-label">逾期数量</div></div>
    <div class="stat-card success"><div class="stat-value" id="stat-logins">-</div><div class="stat-label">今日登录</div></div>
  </div>

  <div class="dashboard-grid">
    <!-- 左列 -->
    <div>
      <div class="card">
        <div class="card-title">📈 分类统计</div>
        <div id="category-chart"></div>
      </div>
      <div class="card">
        <div class="card-title">🕐 最近借阅</div>
        <div id="recent-activity"></div>
      </div>
    </div>
    <!-- 右列 -->
    <div>
      <div class="card">
        <div class="card-title">🔥 热门图书 Top 6</div>
        <div id="hot-books"></div>
      </div>
      <div class="card">
        <div class="card-title">📢 最新公告</div>
        <div id="latest-announcements"></div>
      </div>
    </div>
  </div>
</div>

<!-- 修改密码弹窗 -->
<div class="modal-overlay" id="pwd-modal">
  <div class="modal">
    <div class="modal-header">🔑 修改密码<button class="modal-close" onclick="closeModal('pwd-modal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>原密码</label><input type="password" id="pwd-old"></div>
      <div class="form-group"><label>新密码</label><input type="password" id="pwd-new"></div>
      <div id="pwd-error" class="login-error"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('pwd-modal')">取消</button>
      <button class="btn btn-primary" onclick="changePassword()">确认修改</button>
    </div>
  </div>
</div>

<script src="app.js?v=2"></script>
<script>
const user = checkAuth();
if (!user || user.role !== "admin") { alert("仅管理员可访问"); window.location.href = "login.html"; }
displayUserInfo();
renderSidebar("admin");

async function loadDashboard() {
  const data = await apiGet("/api/admin/dashboard");
  if (!data) return;
  document.getElementById("stat-books").textContent = data.total_books;
  document.getElementById("stat-students").textContent = data.total_students;
  document.getElementById("stat-active").textContent = data.active_borrows;
  document.getElementById("stat-overdue").textContent = data.overdue_count;
  document.getElementById("stat-logins").textContent = data.today_logins;

  // 分类统计
  const cats = data.category_stats || [];
  const maxCount = Math.max(...cats.map(c=>c.count), 1);
  document.getElementById("category-chart").innerHTML = cats.map(c =>
    `<div class="category-bar"><span class="bar-label">${c.category}</span><div class="bar-fill"><div class="bar-inner" style="width:${(c.count/maxCount*100).toFixed(0)}%"></div></div><span style="font-size:12px;color:#6b8299;">${c.count}</span></div>`
  ).join("") || '<span style="color:#999;">暂无数据</span>';

  // 热门图书
  const hot = data.hot_books || [];
  document.getElementById("hot-books").innerHTML = hot.map((b,i) =>
    `<div class="hot-book-item"><span>${i+1}. <strong>${b.book_name}</strong> <span style="color:#999;font-size:11px;">${b.author}</span></span><span style="color:#4a90d9;">借阅 ${b.total_borrows} 次</span></div>`
  ).join("") || '<span style="color:#999;">暂无数据</span>';

  // 最近借阅
  const recent = data.recent_borrows || [];
  document.getElementById("recent-activity").innerHTML = recent.map(r =>
    `<div class="activity-item">📖 <strong>${r.student_name||"-"}</strong> ${r.status==="returned"?"归还了":"借了"}《${r.book_name||"-"}》<span style="color:#999;float:right;">${(r.borrow_time||"").replace("T"," ").slice(0,16)}</span></div>`
  ).join("") || '<span style="color:#999;">暂无借阅记录</span>';

  // 公告
  const anns = data.announcements || [];
  document.getElementById("latest-announcements").innerHTML = anns.map(a =>
    `<div class="hot-book-item"><span>📢 <strong>${a.title}</strong></span><span style="color:#999;font-size:11px;">${(a.create_time||"").slice(0,10)}</span></div>`
  ).join("") || '<span style="color:#999;">暂无公告</span>';
}

// 修改密码
function openPwdModal() {
  document.getElementById("pwd-old").value = "";
  document.getElementById("pwd-new").value = "";
  document.getElementById("pwd-error").style.display = "none";
  openModal("pwd-modal");
}

async function changePassword() {
  const oldPwd = document.getElementById("pwd-old").value;
  const newPwd = document.getElementById("pwd-new").value;
  const err = document.getElementById("pwd-error");
  if (!oldPwd || !newPwd) { err.textContent = "请填写完整"; err.style.display="block"; return; }
  const res = await fetch(`/api/admin/change-password?old_password=${encodeURIComponent(oldPwd)}&new_password=${encodeURIComponent(newPwd)}`, {method:"PUT", headers:{Authorization:"Bearer "+getToken()}});
  const data = await res.json();
  if (res.ok) { alert("密码修改成功！"); closeModal("pwd-modal"); }
  else { err.textContent = data.detail || "修改失败"; err.style.display="block"; }
}

loadDashboard();
</script>
</body>
</html>
