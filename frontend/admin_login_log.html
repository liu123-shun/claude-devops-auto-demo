<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全局登录日志 — 管理后台</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="logo">📚 图书借阅管理系统 · 管理后台</div>
  <div class="user-info">
    <span>👤 <span id="display-name">管理员</span></span>
    <button onclick="logout()">退出登录</button>
  </div>
</div>

<div class="sidebar">
  <div class="nav-group"><div class="nav-label">主菜单</div>
    <a href="admin_index.html"><span class="icon">📊</span><span>首页看板</span></a></div>
  <div class="nav-group"><div class="nav-label">业务管理</div>
    <a href="admin_book.html"><span class="icon">📖</span><span>图书管理</span></a>
    <a href="admin_reader.html"><span class="icon">👨‍🎓</span><span>学生管理</span></a></div>
  <div class="nav-group"><div class="nav-label">日志审计</div>
    <a href="admin_login_log.html" class="active"><span class="icon">📝</span><span>登录日志</span></a>
    <a href="admin_borrow_log.html"><span class="icon">📋</span><span>借阅操作日志</span></a>
    <a href="admin_overdue.html"><span class="icon">⚠️</span><span>逾期图书</span></a></div>
</div>

<div class="main-content">
  <div class="breadcrumb">🏠 首页 / 全局登录日志</div>

  <div class="card">
    <div class="toolbar">
      <input type="text" id="search-input" placeholder="🔍 按账号搜索...">
      <button class="btn btn-primary btn-sm" onclick="loadLogs()">搜索</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>账号</th><th>角色</th><th>登录IP</th><th>登录时间</th><th>退出时间</th></tr>
        </thead>
        <tbody id="log-tbody"></tbody>
      </table>
    </div>
    <div id="empty-state" class="empty-state" style="display:none;">暂无登录日志</div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
const user = checkAuth();
if (!user || user.role !== "admin") { alert("仅管理员可访问"); window.location.href = "login.html"; }
displayUserInfo();

function loadLogs(page = 1) {
  const keyword = document.getElementById("search-input").value.trim();
  let url = `/api/admin/login-logs?page=${page}&page_size=10`;
  if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;

  apiGet(url).then(data => {
    if (!data) return;
    const tbody = document.getElementById("log-tbody");
    const empty = document.getElementById("empty-state");
    if (!data.items || data.items.length === 0) {
      tbody.innerHTML = ""; empty.style.display = "block";
    } else {
      empty.style.display = "none";
      tbody.innerHTML = data.items.map(l => `
        <tr>
          <td>${l.id}</td>
          <td><strong>${l.username || l.user_id}</strong></td>
          <td>${l.login_role === "admin" ? '<span class="tag tag-red">管理员</span>' : '<span class="tag tag-green">学生</span>'}</td>
          <td>${l.login_ip || "-"}</td>
          <td>${l.login_time ? l.login_time.replace("T"," ").slice(0,19) : "-"}</td>
          <td>${l.logout_time ? l.logout_time.replace("T"," ").slice(0,19) : '<span class="tag tag-yellow">在线</span>'}</td>
        </tr>`).join("");
    }
    renderPagination("pagination", data.page, data.total_pages, loadLogs);
  });
}

loadLogs();
</script>
</body>
</html>
