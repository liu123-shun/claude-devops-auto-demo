<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全局登录日志 — 管理后台</title>
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<div class="topbar">
  <div class="logo">📚 图书借阅管理系统 · 管理后台</div>
  <div class="user-info">
    <span>👤 <span id="display-name">管理员</span></span>
    <button onclick="logout()">退出登录</button>
  </div>
</div>

<div class="sidebar" id="sidebar"></div>
<div class="main-content">
  <div class="breadcrumb">🏠 首页 / 全局登录日志</div>

  <div class="card">
    <div class="toolbar" style="flex-wrap:wrap;">
      <input type="text" id="search-input" placeholder="🔍 按账号搜索...">
      <input type="date" id="filter-date-from" title="登录时间 从">
      <span style="color:#6b8299;">至</span>
      <input type="date" id="filter-date-to" title="登录时间 至">
      <button class="btn btn-primary btn-sm" onclick="loadLogs()">搜索</button>
      <button class="btn btn-outline btn-sm" onclick="exportLoginLogsCSV()">📥 导出CSV</button><button class="btn btn-outline btn-sm" onclick="clearFilters()">清除筛选</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>账号</th><th>角色</th><th>登录IP</th><th>登录时间</th><th>退出时间</th></tr>
        </thead>
        <tbody id="log-tbody"></tbody>
      </table>
    </div>
    <div id="empty-state" class="empty-state" style="display:none;">暂无登录日志</div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script src="app.js?v=3"></script>
<script>
const user = checkAuth();
if (!user || user.role !== "admin") { alert("仅管理员可访问"); window.location.href = "login.html"; }
displayUserInfo();
renderSidebar("admin");
var allLoginLogsData = [];
var allLoginLogsData = [];

function loadLogs(page = 1) {
  const keyword = document.getElementById("search-input").value.trim();
  const dateFrom = document.getElementById("filter-date-from").value;
  const dateTo = document.getElementById("filter-date-to").value;
  let url = `/api/admin/login-logs?page=${page}&page_size=10`;
  if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;

  apiGet(url).then(data => {
  allLoginLogsData = (data.items || []);
    if (!data) return;
    let items = data.items || [];
    allLoginLogsData = (data.items || []);
    // 前端按日期范围过滤
    if (dateFrom) {
      items = items.filter(l => l.login_time && l.login_time >= dateFrom + "T00:00:00");
    }
    if (dateTo) {
      items = items.filter(l => l.login_time && l.login_time <= dateTo + "T23:59:59");
    }
    const tbody = document.getElementById("log-tbody");
    const empty = document.getElementById("empty-state");
    if (items.length === 0) {
      tbody.innerHTML = ""; empty.style.display = "block";
    } else {
      empty.style.display = "none";
      tbody.innerHTML = items.map(l => `
        <tr>
          <td>${l.id}</td>
          <td><strong>${l.username || l.user_id}</strong></td>
          <td>${l.login_role === "admin" ? '<span class="tag tag-red">管理员</span>' : '<span class="tag tag-green">学生</span>'}</td>
          <td>${l.login_ip || "-"}</td>
          <td>${l.login_time ? l.login_time.replace("T"," ").slice(0,19) : "-"}</td>
          <td>${l.logout_time ? l.logout_time.replace("T"," ").slice(0,19) : '<span class="tag tag-yellow">在线</span>'}</td>
        </tr>`).join("");
    }
    // 分页适配过滤后的数据
    const totalPages = Math.ceil(items.length / 10) || 0;
    renderPagination("pagination", page, totalPages, loadLogs);
  });
}

function clearFilters() {
  document.getElementById("search-input").value = "";
  document.getElementById("filter-date-from").value = "";
  document.getElementById("filter-date-to").value = "";
  loadLogs();
}

loadLogs();

function exportLoginLogsCSV() {
    if (!allLoginLogsData.length) { alert("暂无数据可导出"); return; }
    exportCSV("登录日志", ["ID","账号","角色","登录IP","登录时间","退出时间"],
        allLoginLogsData.map(function(l){ return [l.id,l.username||l.user_id,l.login_role=="admin"?"管理员":"学生",l.login_ip||"",(l.login_time||"").replace("T"," ").slice(0,19),(l.logout_time||"").replace("T"," ").slice(0,19)||"在线"]; }));
}
</script>
</body>
</html>
