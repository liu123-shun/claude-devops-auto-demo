<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逾期图书 — 管理后台</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="logo">📚 图书借阅管理系统 · 管理后台</div>
  <div class="user-info">
    <span>👤 <span id="display-name">管理员</span></span>
    <button onclick="logout()">退出登录</button>
  </div>
</div>

<div class="sidebar" id="sidebar"></div>
<div class="main-content">
  <div class="breadcrumb">🏠 首页 / 逾期图书</div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;">
      <div class="toolbar" style="margin-bottom:0;">
        <input type="text" id="search-input" placeholder="🔍 搜索书名或学生...">
        <button class="btn btn-primary btn-sm" onclick="loadOverdue()">搜索</button>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('search-input').value='';loadOverdue();">清除</button>
      </div>
      <span style="color:#6b8299;font-size:13px;">筛选条件：借出超过 <strong>30天</strong> 未归还</span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>图书名称</th><th>借阅学生</th><th>借阅时间</th><th>逾期天数</th><th>状态</th><th>操作</th></tr>
        </thead>
        <tbody id="overdue-tbody"></tbody>
      </table>
    </div>
    <div id="empty-state" class="empty-state" style="display:none;">🎉 暂无逾期图书</div>
  </div>
</div>

<script src="app.js"></script>
<script>
const user = checkAuth();
if (!user || user.role !== "admin") { alert("仅管理员可访问"); window.location.href = "login.html"; }
displayUserInfo();
renderSidebar("admin");

function loadOverdue() {
  const keyword = document.getElementById("search-input").value.trim();
  let url = "/api/admin/overdue";
  if (keyword) url += `?keyword=${encodeURIComponent(keyword)}`;

  apiGet(url).then(data => {
    const tbody = document.getElementById("overdue-tbody");
    const empty = document.getElementById("empty-state");
    if (!data || data.length === 0) {
      tbody.innerHTML = ""; empty.style.display = "block";
    } else {
      empty.style.display = "none";
      const now = new Date();
      tbody.innerHTML = data.map(r => {
        const borrowDate = new Date(r.borrow_time);
        const overdueDays = Math.floor((now - borrowDate) / (1000 * 60 * 60 * 24)) - 30;
        return `
        <tr style="background:#fff5f5;">
          <td>${r.id}</td>
          <td><strong style="color:#c62828;">${r.book_name || "-"}</strong></td>
          <td>${r.student_name || "-"}</td>
          <td>${r.borrow_time ? r.borrow_time.replace("T"," ").slice(0,19) : "-"}</td>
          <td><span class="tag tag-red">${Math.max(0, overdueDays)} 天</span></td>
          <td><span class="tag tag-red">逾期</span></td>
          <td><button class="btn btn-success btn-sm" onclick="returnBook(${r.id})">📥 还书</button></td>
        </tr>`;
      }).join("");
    }
  });
}

async function returnBook(borrowId) {
  if (!confirm("确认该图书已归还？")) return;
  const result = await apiPut(`/api/admin/borrows/${borrowId}/return`);
  if (!result) return;
  if (result.id) {
    alert("还书成功！");
    loadOverdue();
  }
}

loadOverdue();
</script>
</body>
</html>
