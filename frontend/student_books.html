<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>馆藏浏览 — 学生端</title>
<link rel="stylesheet" href="style.css">
<style>
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px;}
.book-card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow:hidden;transition:all .2s;cursor:pointer;display:flex;flex-direction:column;}
.book-card:hover{box-shadow:0 4px 18px rgba(0,0,0,0.12);transform:translateY(-2px);}
.book-cover{height:130px;background:linear-gradient(135deg,#e3edf7,#c8ddf5);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;}
.book-cover .cat-badge{position:absolute;top:8px;right:8px;background:rgba(74,144,217,0.85);color:#fff;padding:2px 8px;border-radius:12px;font-size:10px;}
.book-cover .stock-badge{position:absolute;bottom:8px;left:8px;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
.book-info{padding:14px;flex:1;display:flex;flex-direction:column;}
.book-title{font-weight:700;font-size:14px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.book-author{font-size:12px;color:#6b8299;margin-bottom:4px;}
.book-meta{font-size:11px;color:#999;display:flex;gap:12px;margin-top:auto;}
.book-card.out-of-stock{opacity:.55;}
.book-card.out-of-stock .book-cover{background:linear-gradient(135deg,#f0f0f0,#e0e0e0);}
.view-toggle{display:flex;gap:0;background:#f0f4f8;border-radius:8px;padding:4px;width:fit-content;}
.view-toggle button{padding:6px 14px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:#6b8299;}
.view-toggle button.active{background:#fff;color:#4a90d9;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">📚 图书借阅管理系统 · 学生端</div>
  <div class="user-info"><span>👤 <span id="display-name"></span></span><button onclick="logout()">退出登录</button></div>
</div>
<div class="sidebar">
  <div class="nav-group"><div class="nav-label">主菜单</div>
    <a href="student_index.html"><span class="icon">📊</span><span>我的首页</span></a>
    <a href="student_books.html" class="active"><span class="icon">📚</span><span>馆藏浏览</span></a></div>
  <div class="nav-group"><div class="nav-label">我的记录</div>
    <a href="student_my_borrow.html"><span class="icon">📖</span><span>我的借阅</span></a>
    <a href="student_stats.html"><span class="icon">📈</span><span>阅读统计</span></a>
    <a href="student_my_login_log.html"><span class="icon">📝</span><span>登录日志</span></a></div>
</div>
<div class="main-content">
  <div class="breadcrumb">🏠 首页 / 馆藏浏览</div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;">
      <div class="toolbar" style="margin-bottom:0;flex:1;">
        <input type="text" id="search-input" placeholder="🔍 书名/作者/ISBN..." style="width:220px;">
        <select id="filter-category"><option value="">全部分类</option></select>
        <select id="filter-stock"><option value="">全部库存</option><option value="1">有库存</option></select>
        <button class="btn btn-primary btn-sm" onclick="loadBooks()">搜索</button>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('search-input').value='';document.getElementById('filter-category').value='';document.getElementById('filter-stock').value='';loadBooks();">清除</button>
      </div>
      <div class="view-toggle">
        <button class="active" onclick="setView('grid')">📱 卡片</button>
        <button onclick="setView('list')">📋 列表</button>
      </div>
    </div>

    <div class="book-grid" id="book-container"></div>
    <div id="book-empty" class="empty-state" style="display:none;">未找到匹配图书</div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- 图书详情弹窗 -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" style="width:600px;max-height:85vh;">
    <div class="modal-header">📖 图书详情<button class="modal-close" onclick="closeModal('detail-modal')">&times;</button></div>
    <div class="modal-body" id="detail-content"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('detail-modal')">关闭</button>
      <button class="btn btn-primary" id="detail-borrow-btn" onclick="borrowFromDetail()">📥 立即借阅</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
const user=checkAuth();
if(!user||user.role!=="student"){alert("仅学生可访问");window.location.href="login.html";}
displayUserInfo();

let currentPage=1, currentView="grid", pendingBook=null;

async function init(){
  const cats=await apiGet("/api/student/categories");
  if(cats)cats.forEach(c=>{document.getElementById("filter-category").innerHTML+=`<option value="${c.name}">${c.name}(${c.count})</option>`;});
  loadBooks();
}
init();

function loadBooks(page=1){
  currentPage=page;
  const kw=document.getElementById("search-input").value.trim();
  const cat=document.getElementById("filter-category").value;
  const hasStock=document.getElementById("filter-stock").value;
  let url=`/api/student/books?page=${page}&page_size=12`;
  if(kw)url+=`&keyword=${encodeURIComponent(kw)}`;
  if(cat)url+=`&category=${encodeURIComponent(cat)}`;

  apiGet(url).then(data=>{
    if(!data)return;
    let items=data.items||[];
    if(hasStock==="1")items=items.filter(b=>b.stock>0);

    const container=document.getElementById("book-container");
    const empty=document.getElementById("book-empty");
    if(!items.length){container.innerHTML="";empty.style.display="block";return;}
    empty.style.display="none";

    if(currentView==="grid"){
      container.className="book-grid";
      container.innerHTML=items.map(b=>`
        <div class="book-card ${b.stock<=0?'out-of-stock':''}" onclick="viewDetail(${b.id})">
          <div class="book-cover">
            <span>📘</span>
            <span class="cat-badge">${b.category||"未分类"}</span>
            <span class="stock-badge" style="background:${b.stock>3?'#e8f5e9':b.stock>0?'#fff3e0':'#ffebee'};color:${b.stock>3?'#2e7d32':b.stock>0?'#e65100':'#c62828'};">${b.stock>0?`库存 ${b.stock}`:'已借完'}</span>
          </div>
          <div class="book-info">
            <div class="book-title" title="${b.book_name}">${b.book_name}</div>
            <div class="book-author">✍️ ${b.author}</div>
            <div class="book-author" style="font-size:11px;">📚 ${b.publisher||'未知出版社'} · ISBN ${b.isbn||'—'}</div>
            <div class="book-meta"><span>📖 借阅 ${b.total_borrows} 次</span>${b.description?`<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">📝 ${b.description.slice(0,30)}</span>`:''}</div>
          </div>
        </div>`).join("");
    } else {
      container.className="";
      container.innerHTML=`<div class="table-wrap"><table><thead><tr><th>ID</th><th>书名</th><th>作者</th><th>分类</th><th>出版社</th><th>库存</th><th>借阅</th><th>操作</th></tr></thead><tbody>${items.map(b=>`
        <tr style="${b.stock<=0?'opacity:.45;':''}">
          <td>${b.id}</td><td><strong>${b.book_name}</strong></td><td>${b.author}</td><td>${b.category||'-'}</td><td>${b.publisher||'-'}</td>
          <td>${b.stock}</td><td>${b.total_borrows}次</td>
          <td><button class="btn btn-outline btn-sm" onclick="viewDetail(${b.id})">详情</button>${b.stock>0?` <button class="btn btn-primary btn-sm" onclick="quickBorrow(${b.id},'${b.book_name.replace(/'/g,"\\'")}')">借书</button>`:''}</td>
        </tr>`).join("")}</tbody></table></div>`;
    }
    renderPagination("pagination",data.page,data.total_pages,loadBooks);
  });
}

function setView(v){currentView=v;document.querySelectorAll(".view-toggle button").forEach(b=>b.classList.toggle("active",b.textContent.includes(v==="grid"?"卡片":"列表")));loadBooks(currentPage);}

async function viewDetail(id){
  const d=await apiGet("/api/student/books/"+id);
  if(!d)return;
  pendingBook=d;
  document.getElementById("detail-content").innerHTML=`
    <h3>${d.book_name}</h3>
    <table style="margin-top:10px;"><tr><td style="color:#6b8299;width:70px;">作者</td><td>${d.author}</td></tr>
    <tr><td style="color:#6b8299;">分类</td><td>${d.category||'-'}</td></tr>
    <tr><td style="color:#6b8299;">ISBN</td><td>${d.isbn||'-'}</td></tr>
    <tr><td style="color:#6b8299;">出版社</td><td>${d.publisher||'-'}</td></tr>
    <tr><td style="color:#6b8299;">库存</td><td><strong style="color:${d.stock>0?'#27ae60':'#e74c3c'};">${d.stock>0?d.stock+' 册':'已借完'}</strong></td></tr>
    <tr><td style="color:#6b8299;">累计借阅</td><td>${d.total_borrows} 次</td></tr></table>
    ${d.description?`<p style="margin-top:10px;color:#555;font-size:13px;">📝 ${d.description}</p>`:''}
  `;
  const btn=document.getElementById("detail-borrow-btn");
  if(d.stock>0){btn.style.display="";btn.textContent="📥 立即借阅";}else{btn.style.display="none";}
  openModal("detail-modal");
}

async function borrowFromDetail(){
  if(!pendingBook)return;
  const r=await apiPost("/api/student/borrows",{book_id:pendingBook.id,reader_id:0});
  if(!r)return;
  if(r.id){alert(`借书成功！《${r.book_name}》`);closeModal("detail-modal");loadBooks(currentPage);}
  else alert(typeof r.detail==='string'?r.detail:JSON.stringify(r.detail));
}

async function quickBorrow(id,name){
  if(!confirm(`确认借阅《${name}》？`))return;
  const r=await apiPost("/api/student/borrows",{book_id:id,reader_id:0});
  if(!r)return;
  if(r.id){alert(`借书成功！《${r.book_name}》`);loadBooks(currentPage);}
  else alert(typeof r.detail==='string'?r.detail:JSON.stringify(r.detail));
}
</script>
</body>
</html>
