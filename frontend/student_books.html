<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>馆藏浏览 — 学生端</title>
<link rel="stylesheet" href="style.css?v=3">
<style>
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px;}
.book-card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow:hidden;transition:all .2s;cursor:pointer;display:flex;flex-direction:column;}
.book-card:hover{box-shadow:0 4px 18px rgba(0,0,0,0.12);transform:translateY(-2px);}
.book-cover{height:130px;background:linear-gradient(135deg,#e3edf7,#c8ddf5);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden;}
.book-cover img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.book-cover .cover-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:inherit;}
.book-cover .cat-badge{position:absolute;top:8px;right:8px;background:rgba(74,144,217,0.85);color:#fff;padding:2px 8px;border-radius:12px;font-size:10px;}
.book-cover .stock-badge{position:absolute;bottom:8px;left:8px;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
.book-info{padding:14px;flex:1;display:flex;flex-direction:column;}
.book-title{font-weight:700;font-size:14px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.book-author{font-size:12px;color:#6b8299;margin-bottom:4px;}
.book-meta{font-size:11px;color:#999;display:flex;gap:12px;margin-top:auto;}
.book-card.out-of-stock{opacity:.55;}
.book-card.out-of-stock .book-cover{background:linear-gradient(135deg,#f0f0f0,#e0e0e0);}
.view-toggle{display:flex;gap:0;background:#f0f4f8;border-radius:8px;padding:4px;width:fit-content;}
.view-toggle button{padding:6px 14px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:#6b8299;}
.view-toggle button.active{background:#fff;color:#4a90d9;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.fav-star-btn{position:absolute;top:6px;left:6px;background:rgba(255,255,255,0.9);border:1px solid #ddd;width:26px;height:26px;border-radius:50%;font-size:14px;cursor:pointer;z-index:5;display:flex;align-items:center;justify-content:center;transition:all .2s;}.fav-star-btn.favved{color:#e74c3c;border-color:#e74c3c;}</style>
</head>
<body>
<div class="topbar">
  <div class="logo">📚 图书借阅管理系统 · 学生端</div>
  <div class="user-info"><span>👤 <span id="display-name"></span></span><button onclick="logout()">退出登录</button></div>
</div>
<div class="sidebar" id="sidebar"></div>
<div class="main-content">
  <div class="breadcrumb">🏠 首页 / 馆藏浏览</div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;">
      <div class="toolbar" style="margin-bottom:0;flex:1;">
        <input type="text" id="search-input" placeholder="🔍 书名/作者/ISBN..." style="width:220px;">
        <select id="filter-category"><option value="">全部分类</option></select>
        <select id="filter-stock"><option value="">全部库存</option><option value="1">有库存</option></select>
        <button class="btn btn-primary btn-sm" onclick="loadBooks()">搜索</button>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('search-input').value='';document.getElementById('filter-category').value='';document.getElementById('filter-stock').value='';loadBooks();">清除</button>
      </div>
      <div class="view-toggle">
        <button class="active" onclick="setView('grid')">📱 卡片</button>
        <button onclick="setView('list')">📋 列表</button>
      </div>
    </div>

    <div class="book-grid" id="book-container"></div>
    <div id="book-empty" class="empty-state" style="display:none;">未找到匹配图书</div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- 图书详情弹窗 -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" style="width:600px;max-height:85vh;">
    <div class="modal-header">📖 图书详情<button class="modal-close" onclick="closeModal('detail-modal')">&times;</button></div>
    <div class="modal-body" id="detail-content"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('detail-modal')">关闭</button>
      <button class="btn btn-primary" id="detail-borrow-btn" onclick="borrowFromDetail()">📥 立即借阅</button>
    </div>
  </div>
</div>

<script src="app.js?v=3"></script>
<script>
const user=checkAuth();
if(!user||user.role!=="student"){alert("仅学生可访问");window.location.href="login.html";}
displayUserInfo();
renderSidebar("student");

let currentPage=1, currentView="grid", pendingBook=null;

var favoriteIds = {};

async function loadFavoriteIds(){
  var d = await apiGet("/api/student/favorites/ids");
  if(d&&d.ids){ d.ids.forEach(function(id){favoriteIds[id]=true;}); }
}

async function toggleFavorite(bookId, event){
  if(event)event.stopPropagation();
  if(favoriteIds[bookId]){
    await apiDelete("/api/student/favorites/"+bookId);
    delete favoriteIds[bookId];
  }else{
    await apiPost("/api/student/favorites?book_id="+bookId);
    favoriteIds[bookId]=true;
  }
  loadBooks(currentPage);
}


async function init(){
  loadFavoriteIds();
  const cats=await apiGet("/api/student/categories");
  if(cats)cats.forEach(c=>{document.getElementById("filter-category").innerHTML+=`<option value="${c.name}">${c.name}(${c.count})</option>`;});
  loadBooks();
}
init();

function loadBooks(page=1){
  currentPage=page;
  const kw=document.getElementById("search-input").value.trim();
  const cat=document.getElementById("filter-category").value;
  const hasStock=document.getElementById("filter-stock").value;
  let url=`/api/student/books?page=${page}&page_size=12`;
  if(kw)url+=`&keyword=${encodeURIComponent(kw)}`;
  if(cat)url+=`&category=${encodeURIComponent(cat)}`;

  apiGet(url).then(data=>{
    if(!data)return;
    let items=data.items||[];
    if(hasStock==="1")items=items.filter(b=>b.stock>0);

    const container=document.getElementById("book-container");
    const empty=document.getElementById("book-empty");
    if(!items.length){container.innerHTML="";empty.style.display="block";return;}
    empty.style.display="none";

    if(currentView==="grid"){
      container.className="book-grid";
      container.innerHTML=items.map(b=>`
        <div class="book-card ${b.stock<=0?'out-of-stock':''}" onclick="viewDetail(${b.id})"><button class="fav-star-btn ${favoriteIds[b.id]?'favved':''}" onclick="toggleFavorite(${b.id},event)" title="${favoriteIds[b.id]?'取消收藏':'收藏'}">${favoriteIds[b.id]?'❤️':'♡'}</button>
          <div class="book-cover">
            ${b.cover_url?`<img src="${b.cover_url}" alt="${b.book_name}" onerror="this.style.display='none'" loading="lazy">`:''}
            <span class="cover-fallback">📘</span>
            <span class="cat-badge">${b.category||"未分类"}</span>
            <span class="stock-badge" style="background:${b.stock>3?'#e8f5e9':b.stock>0?'#fff3e0':'#ffebee'};color:${b.stock>3?'#2e7d32':b.stock>0?'#e65100':'#c62828'};">${b.stock>0?`库存 ${b.stock}`:'已借完'}</span>
          </div>
          <div class="book-info">
            <div class="book-title" title="${b.book_name}">${b.book_name}</div>
            <div class="book-author">✍️ ${b.author}</div>
            <div class="book-author" style="font-size:11px;">📚 ${b.publisher||'未知出版社'} · ISBN ${b.isbn||'—'}</div>
            <div class="book-meta"><span>📖 借阅 ${b.total_borrows} 次</span>${b.description?`<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">📝 ${b.description.slice(0,30)}</span>`:''}</div>
          </div>
        </div>`).join("");
    } else {
      container.className="";
      container.innerHTML=`<div class="table-wrap"><table><thead><tr><th>ID</th><th>书名</th><th>作者</th><th>分类</th><th>出版社</th><th>库存</th><th>借阅</th><th>操作</th></tr></thead><tbody>${items.map(b=>`
        <tr style="${b.stock<=0?'opacity:.45;':''}">
          <td>${b.id}</td><td><strong>${b.book_name}</strong></td><td>${b.author}</td><td>${b.category||'-'}</td><td>${b.publisher||'-'}</td>
          <td>${b.stock}</td><td>${b.total_borrows}次</td>
          <td><button class="btn btn-outline btn-sm" onclick="viewDetail(${b.id})">详情</button>${b.stock>0?` <button class="btn btn-primary btn-sm" onclick="quickBorrow(${b.id},'${b.book_name.replace(/'/g,"\\'")}')">借书</button>`:''}</td>
        </tr>`).join("")}</tbody></table></div>`;
    }
    renderPagination("pagination",data.page,data.total_pages,loadBooks);
  });
}

function setView(v){currentView=v;document.querySelectorAll(".view-toggle button").forEach(b=>b.classList.toggle("active",b.textContent.includes(v==="grid"?"卡片":"列表")));loadBooks(currentPage);}

async function viewDetail(id){
  var d=await apiGet("/api/student/books/"+id);
  if(!d)return;
  pendingBook=d;
  var stars='';if(d.avg_rating>0){stars='★'.repeat(Math.round(d.avg_rating))+'☆'.repeat(5-Math.round(d.avg_rating))+' <span style="font-size:14px;color:#f39c12;font-weight:700;">'+d.avg_rating+'</span> <span style="font-size:12px;color:#6b8299;">('+d.review_count+'条评价)</span>';}
  else{stars='<span style="font-size:12px;color:#999;">暂无评分</span>';}
  document.getElementById("detail-content").innerHTML=
    '<h3>'+d.book_name+'</h3><div style="font-size:20px;margin:4px 0;">'+stars+'</div>'+
    '<table style="margin-top:10px;"><tr><td style="color:#6b8299;width:70px;">作者</td><td>'+d.author+'</td></tr>'+
    '<tr><td style="color:#6b8299;">分类</td><td>'+(d.category||'-')+'</td></tr>'+
    '<tr><td style="color:#6b8299;">ISBN</td><td>'+(d.isbn||'-')+'</td></tr>'+
    '<tr><td style="color:#6b8299;">出版社</td><td>'+(d.publisher||'-')+'</td></tr>'+
    '<tr><td style="color:#6b8299;">库存</td><td><strong style="color:'+(d.stock>0?'#27ae60':'#e74c3c')+';">'+(d.stock>0?d.stock+' 册':'已借完')+'</strong></td></tr>'+
    '<tr><td style="color:#6b8299;">累计借阅</td><td>'+d.total_borrows+' 次</td></tr></table>'+
    (d.description?'<p style="margin-top:10px;color:#555;font-size:13px;">📝 '+d.description+'</p>':'')+
    '<div style="margin-top:14px;"><strong>💬 评论</strong></div>'+
    '<div id="review-list" style="max-height:180px;overflow-y:auto;font-size:12px;"></div>'+
    '<div id="review-form" style="margin-top:10px;padding-top:10px;border-top:1px solid #eee;"></div>';
  renderReviewList(d);
  loadReviewForm(d.id);
  var btn=document.getElementById("detail-borrow-btn");
  if(d.stock>0){btn.style.display="";btn.textContent="📥 立即借阅";}else{btn.style.display="none";}
  openModal("detail-modal");
}

function renderReviewList(data){
  var list=document.getElementById("review-list");
  if(!list)return;
  var revs=data.reviews||[];
  if(!revs.length){list.innerHTML='<span style="color:#999;">暂无评论</span>';return;}
  var html='';
  for(var i=0;i<revs.length;i++){
    var rv=revs[i];
    var isMine=rv.user_name===(user.name||user.username);
    var comment=rv.comment||'';
    html+='<div style="padding:6px 0;border-bottom:1px solid #f0f0f0;position:relative;">'+
      '<span style="color:#f39c12;">'+'★'.repeat(rv.rating)+'☆'.repeat(5-rv.rating)+'</span> <strong>'+rv.user_name+'</strong>'+
      '<span style="color:#999;font-size:11px;margin-left:4px;">'+(rv.create_time||'').slice(0,10)+'</span>';
    if(isMine){
      html+='<span style="float:right;font-size:10px;">'+
        '<button class="btn btn-outline btn-sm" onclick="editMyReview('+rv.id+','+rv.rating+',event)" style="padding:1px 6px;font-size:10px;margin-right:4px;">编辑</button>'+
        '<button class="btn btn-danger btn-sm" onclick="deleteMyReview('+rv.id+','+data.id+')" style="padding:1px 6px;font-size:10px;">删除</button></span>';
    }
    if(comment){html+='<div style="color:#555;margin-top:2px;">'+comment+'</div>';}
    html+='</div>';
  }
  list.innerHTML=html;
}


async function loadReviewForm(bookId){
  const check=await apiGet("/api/student/reviews/check/"+bookId);
  var formDiv=document.getElementById("review-form");
  if(!formDiv)return;
  if(check&&check.can_review){
    formDiv.innerHTML='<div style="font-weight:600;font-size:12px;margin-bottom:6px;">✍️ 写评价</div><div id="star-picker" style="font-size:22px;cursor:pointer;margin-bottom:4px;">'+[1,2,3,4,5].map(function(i){return'<span data-s="'+i+'" style="color:#ddd;">★</span>';}).join("")+'</div><textarea id="rv-comment" rows="2" placeholder="说说你的阅读感受（选填）" style="width:100%;border:1px solid #dce3ea;border-radius:6px;padding:6px;font-size:12px;"></textarea><button class="btn btn-primary btn-sm" onclick="submitReview('+bookId+')" style="margin-top:6px;">提交评价</button>';
    var stars=document.querySelectorAll("#star-picker span");
    var currentRating=0;
    stars.forEach(function(s,i){
      s.addEventListener("click",function(){currentRating=i+1;stars.forEach(function(ss,j){ss.style.color=j<currentRating?"#f39c12":"#ddd";});});
      s.addEventListener("mouseenter",function(){stars.forEach(function(ss,j){ss.style.color=j<=i?"#f1c40f":"#ddd";});});
    });
    document.getElementById("star-picker").addEventListener("mouseleave",function(){stars.forEach(function(ss,j){ss.style.color=j<currentRating?"#f39c12":"#ddd";});});
    window._reviewRating=function(){return currentRating;};
  }else if(check&&check.my_review){
    formDiv.innerHTML='<div style="font-size:12px;color:#6b8299;">✅ 你已评价：<span style="color:#f39c12;">'+('★'.repeat(check.my_review.rating))+'☆'.repeat(5-check.my_review.rating)+'</span>'+(check.my_review.comment?' <span style="color:#555;">\"'+check.my_review.comment+'\"</span>':'')+'</div>';
  }else if(check){
    formDiv.innerHTML='<div style="font-size:12px;color:#999;">'+check.reason+'</div>';
  }
}

async function submitReview(bookId){
  var rating=(window._reviewRating&&window._reviewRating())||3;
  var comment=document.getElementById("rv-comment").value.trim();
  if(rating===0){alert("请先点击星星评分");return;}
  var res=await fetch("/api/student/reviews",{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+getToken()},body:JSON.stringify({book_id:bookId,rating:rating,comment:comment||null})});
  if(res.ok){alert("评价成功！");closeModal("detail-modal");viewDetail(bookId);}
  else{var d=await res.json();alert(d.detail||"提交失败");}
}


async function editMyReview(reviewId, oldRating, ev){
  var html = '<div style="font-weight:600;font-size:12px;margin-bottom:6px;">✏️ 修改评价</div><div id="edit-star-picker" style="font-size:22px;cursor:pointer;margin-bottom:4px;">';
  for(var i=1;i<=5;i++){ html += '<span data-s="'+i+'" style="color:'+(i<=oldRating?'#f39c12':'#ddd')+';">★</span>'; }
  html += '</div><textarea id="edit-rv-comment" rows="2" style="width:100%;border:1px solid #dce3ea;border-radius:6px;padding:6px;font-size:12px;">'+(oldComment||'')+'</textarea>';
  html += '<div style="display:flex;gap:6px;margin-top:6px;"><button class="btn btn-primary btn-sm" onclick="submitEditReview('+reviewId+')">保存修改</button><button class="btn btn-outline btn-sm" onclick="cancelEditReview()">取消</button></div>';
  document.getElementById("review-form").innerHTML=html;
  var stars=document.querySelectorAll("#edit-star-picker span");
  var currentRating=oldRating;
  stars.forEach(function(s,i){
    s.addEventListener("click",function(){currentRating=i+1;stars.forEach(function(ss,j){ss.style.color=j<currentRating?"#f39c12":"#ddd";});});
    s.addEventListener("mouseenter",function(){stars.forEach(function(ss,j){ss.style.color=j<=i?"#f1c40f":"#ddd";});});
  });
  document.getElementById("edit-star-picker").addEventListener("mouseleave",function(){stars.forEach(function(ss,j){ss.style.color=j<currentRating?"#f39c12":"#ddd";});});
  window._editReviewRating=function(){return currentRating;};
}

function cancelEditReview(){
  if(pendingBook) loadReviewForm(pendingBook.id);
}

async function submitEditReview(reviewId){
  var rating=(window._editReviewRating&&window._editReviewRating())||3;
  var comment=document.getElementById("edit-rv-comment").value.trim();
  var res=await fetch("/api/student/reviews/"+reviewId,{method:"PUT",headers:{"Content-Type":"application/json",Authorization:"Bearer "+getToken()},body:JSON.stringify({rating:rating,comment:comment||null})});
  if(res.ok){alert("修改成功！");closeModal("detail-modal");viewDetail(pendingBook.id);}
  else{var d=await res.json();alert(d.detail||"修改失败");}
}

async function deleteMyReview(reviewId, bookId){
  if(!confirm("确定删除自己的评价？"))return;
  var res=await apiDelete("/api/student/reviews/"+reviewId);
  if(!res)return;
  if(res.message){alert("已删除");closeModal("detail-modal");viewDetail(bookId);}
}

async function borrowFromDetail(){
  if(!pendingBook)return;
  const r=await apiPost("/api/student/borrows",{book_id:pendingBook.id,reader_id:0});
  if(!r)return;
  if(r.id){alert(`借书成功！《${r.book_name}》`);closeModal("detail-modal");loadBooks(currentPage);}
  else alert(typeof r.detail==='string'?r.detail:JSON.stringify(r.detail));
}

async function quickBorrow(id,name){
  if(!confirm(`确认借阅《${name}》？`))return;
  const r=await apiPost("/api/student/borrows",{book_id:id,reader_id:0});
  if(!r)return;
  if(r.id){alert(`借书成功！《${r.book_name}》`);loadBooks(currentPage);}
  else alert(typeof r.detail==='string'?r.detail:JSON.stringify(r.detail));
}
</script>
</body>
</html>
