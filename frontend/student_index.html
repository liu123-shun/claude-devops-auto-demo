<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学生首页 — 图书借阅管理系统</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="logo">📚 图书借阅管理系统 · 学生端</div>
  <div class="user-info">
    <span>👤 <span id="display-name">学生</span></span>
    <span id="display-role">学生</span>
    <button onclick="logout()">退出登录</button>
  </div>
</div>

<div class="sidebar">
  <div class="nav-group">
    <div class="nav-label">主菜单</div>
    <a href="student_index.html" class="active"><span class="icon">📊</span><span>我的首页</span></a>
  </div>
  <div class="nav-group">
    <div class="nav-label">我的记录</div>
    <a href="student_my_borrow.html"><span class="icon">📖</span><span>我的借阅</span></a>
    <a href="student_my_login_log.html"><span class="icon">📝</span><span>我的登录日志</span></a>
  </div>
</div>

<div class="main-content">
  <div class="breadcrumb">🏠 学生首页 / 数据看板</div>

  <div class="stats-row">
    <div class="stat-card warning"><div class="stat-value" id="stat-active">-</div><div class="stat-label">当前未归还</div></div>
    <div class="stat-card success"><div class="stat-value" id="stat-total">-</div><div class="stat-label">历史借阅总数</div></div>
  </div>

  <div class="card">
    <div class="card-title">⚡ 快速入口</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <a href="student_my_borrow.html" class="btn btn-primary">📖 查看我的借阅</a>
      <a href="student_my_login_log.html" class="btn btn-outline">📝 我的登录日志</a>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
const user = checkAuth();
if (!user || user.role !== "student") { alert("仅学生可访问"); window.location.href = "login.html"; }
displayUserInfo();

async function loadDashboard() {
  try {
    const data = await apiGet("/api/student/dashboard");
    if (!data) return;
    document.getElementById("stat-active").textContent = data.active_borrows;
    document.getElementById("stat-total").textContent = data.total_borrows;
  } catch (e) {
    console.error(e);
  }
}

loadDashboard();
</script>
</body>
</html>
