<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学生首页</title>
<link rel="stylesheet" href="style.css">
<style>
.profile-card{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.profile-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#4a90d9,#6db3f2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;}
.hot-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
.hot-item:last-child{border-bottom:none;}
.ann-card{padding:10px;border-left:3px solid #4a90d9;background:#f8fafd;border-radius:0 8px 8px 0;margin-bottom:8px;cursor:pointer;transition:all .2s;}
.ann-card:hover{background:#eef4fb;}
.ann-card .ann-t{font-weight:600;font-size:13px;margin-bottom:2px;}
.ann-card .ann-d{font-size:11px;color:#999;}
.pinned-card{border-left-color:#e74c3c;background:#fff8f8;}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.quick-action{display:flex;flex-direction:column;align-items:center;padding:14px 8px;background:#f8fafd;border-radius:10px;text-decoration:none;color:#2c3e50;transition:all .2s;font-size:13px;font-weight:600;}
.quick-action:hover{background:#e8f0fe;color:#4a90d9;transform:translateY(-1px);}
.quick-action .qa-icon{font-size:26px;margin-bottom:4px;}
.month-bar{display:flex;align-items:end;gap:4px;height:80px;padding-top:8px;}
.month-bar .mb-item{flex:1;display:flex;flex-direction:column;align-items:center;}
.month-bar .mb-fill{width:100%;background:linear-gradient(180deg,#4a90d9,#6db3f2);border-radius:3px 3px 0 0;min-height:2px;transition:height .3s;}
.month-bar .mb-label{font-size:10px;color:#999;margin-top:4px;}
.month-bar .mb-count{font-size:10px;color:#4a90d9;font-weight:600;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">📚 图书借阅管理系统 · 学生端</div>
  <div class="user-info">
    <span>👤 <span id="display-name"></span></span>
    <span style="cursor:pointer;font-size:12px;text-decoration:underline;" onclick="openProfileModal()">编辑资料</span>
    <span style="cursor:pointer;font-size:12px;text-decoration:underline;margin-left:6px;" onclick="openPwdModal()">🔑 改密</span>
    <button onclick="logout()">退出登录</button>
  </div>
</div>
<div class="sidebar" id="sidebar"></div>
<div class="main-content">
  <div class="breadcrumb">🏠 学生首页</div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-value" id="st-books">-</div><div class="stat-label">馆藏图书</div></div>
    <div class="stat-card warning"><div class="stat-value" id="st-active">-</div><div class="stat-label">当前在借</div></div>
    <div class="stat-card success"><div class="stat-value" id="st-total">-</div><div class="stat-label">累计借阅</div></div>
    <div class="stat-card danger"><div class="stat-value" id="st-overdue">-</div><div class="stat-label">逾期数量</div></div>
  </div>

  <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;">
    <div>
      <!-- 公告 -->
      <div class="card">
        <div class="card-title">📢 系统公告</div>
        <div id="ann-list"></div>
      </div>
      <!-- 快速入口 -->
      <div class="card">
        <div class="card-title">⚡ 快速入口</div>
        <div class="quick-actions">
          <a href="student_books.html" class="quick-action"><span class="qa-icon">📚</span>馆藏浏览</a>
          <a href="student_my_borrow.html" class="quick-action"><span class="qa-icon">📖</span>我的借阅</a>
          <a href="student_stats.html" class="quick-action"><span class="qa-icon">📈</span>阅读统计</a>
          <a href="student_my_login_log.html" class="quick-action"><span class="qa-icon">📝</span>登录日志</a>
        </div>
      </div>
      <!-- 借阅趋势 -->
      <div class="card">
        <div class="card-title">📊 近6月借阅趋势</div>
        <div id="monthly-trend" style="height:90px;"></div>
      </div>
    </div>
    <div>
      <!-- 个人信息 -->
      <div class="card">
        <div class="card-title">👤 我的信息</div>
        <div id="profile-info"></div>
      </div>
      <!-- 热门图书 -->
      <div class="card">
        <div class="card-title">🔥 热门图书</div>
        <div id="hot-books"></div>
      </div>
    </div>
  </div>
</div>

<!-- 公告详情弹窗 -->
<div class="modal-overlay" id="ann-detail-modal">
  <div class="modal" style="width:560px;">
    <div class="modal-header"><span id="ann-detail-title"></span><button class="modal-close" onclick="closeModal('ann-detail-modal')">&times;</button></div>
    <div class="modal-body"><div id="ann-detail-content"></div></div>
  </div>
</div>

<!-- 个人资料弹窗 -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal">
    <div class="modal-header">✏️ 编辑资料<button class="modal-close" onclick="closeModal('profile-modal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>手机号</label><input type="text" id="prof-phone"></div>
      <div class="form-group"><label>班级</label><input type="text" id="prof-class"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('profile-modal')">取消</button><button class="btn btn-primary" onclick="saveProfile()">保存</button></div>
  </div>
</div>

<!-- 改密弹窗 -->
<div class="modal-overlay" id="pwd-modal">
  <div class="modal">
    <div class="modal-header">🔑 修改密码<button class="modal-close" onclick="closeModal('pwd-modal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>原密码</label><input type="password" id="pwd-old"></div>
      <div class="form-group"><label>新密码</label><input type="password" id="pwd-new"></div>
      <div id="pwd-error" class="login-error"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('pwd-modal')">取消</button><button class="btn btn-primary" onclick="changePassword()">确认</button></div>
  </div>
</div>

<script src="app.js"></script>
<script>
const user=checkAuth();
if(!user||user.role!=="student"){alert("仅学生可访问");window.location.href="login.html";}
displayUserInfo();
renderSidebar("student");

async function init(){
  const [dash,pf,stats]=await Promise.all([
    apiGet("/api/student/dashboard"),
    apiGet("/api/student/profile"),
    apiGet("/api/student/stats"),
  ]);

  // 看板数字
  if(dash){["st-books","st-total"].forEach((id,i)=>document.getElementById(id).textContent=i===0?dash.total_books:dash.total_borrows);
    document.getElementById("st-active").textContent=dash.active_borrows;
    document.getElementById("st-overdue").textContent=dash.overdue_count;}

  // 个人信息
  if(pf){
    document.getElementById("profile-info").innerHTML=`
      <div class="profile-card">
        <div class="profile-avatar">${(pf.name||pf.username||"?").charAt(0)}</div>
        <div><div style="font-weight:700;font-size:15px;">${pf.name||pf.username}</div>
        <div style="font-size:12px;color:#6b8299;">${pf.reader?.class||"未设置班级"}</div>
        <div style="font-size:12px;color:#6b8299;">📱 ${pf.reader?.phone||"未设置手机"}</div></div>
      </div>`;
    document.getElementById("prof-phone").value=pf.reader?.phone||"";
    document.getElementById("prof-class").value=pf.reader?.class||"";
  }

  // 公告
  const anns=dash?.announcements||[];
  document.getElementById("ann-list").innerHTML=anns.length?anns.map((a,i)=>{
    const firstLine=(a.content||"").split("\n")[0].slice(0,80);
    return `<div class="ann-card ${i===0&&a.is_pinned?'pinned-card':''}" onclick="openAnnDetail(${a.id})">
      <div class="ann-t">${a.is_pinned?'📌 ':''}${a.title}</div>
      <div class="ann-d">${firstLine}${a.content&&a.content.length>80?'...':''} · ${(a.create_time||"").slice(0,10)}</div>
    </div>`;
  }).join(""):'<div class="empty-state">暂无公告</div>';

  // 热门图书
  const hot=dash?.hot_books||[];
  document.getElementById("hot-books").innerHTML=hot.length?hot.map((b,i)=>`
    <div class="hot-item"><span>${i+1}. <strong>${b.book_name}</strong> <span style="color:#999;font-size:11px;">${b.author}</span></span><span style="color:#4a90d9;font-size:12px;">借阅${b.total_borrows}次</span></div>
  `).join(""):'<div class="empty-state">暂无数据</div>';

  // 借阅趋势
  const trend=stats?.monthly_trend||[];
  if(trend.length){
    const maxC=Math.max(...trend.map(t=>t.count),1);
    document.getElementById("monthly-trend").innerHTML=`
      <div class="month-bar">${trend.map(t=>`<div class="mb-item">
        <div class="mb-count">${t.count}</div>
        <div class="mb-fill" style="height:${Math.max(t.count/maxC*60,2)}px;"></div>
        <div class="mb-label">${t.month.slice(5)}月</div>
      </div>`).join("")}</div>`;
  }
}

init();

async function openAnnDetail(id){
  const d=await apiGet("/api/student/announcements/"+id);
  if(!d)return;
  document.getElementById("ann-detail-title").textContent=d.title;
  document.getElementById("ann-detail-content").innerHTML=`<p style="white-space:pre-wrap;">${d.content}</p><p style="color:#999;font-size:12px;margin-top:12px;">发布人: ${d.publisher_name||"-"} · ${(d.create_time||"").slice(0,10)}</p>`;
  openModal("ann-detail-modal");
}

function openProfileModal(){openModal("profile-modal");}
async function saveProfile(){
  const phone=document.getElementById("prof-phone").value.trim(),cls=document.getElementById("prof-class").value.trim();
  let u="/api/student/profile";if(phone)u+="?phone="+encodeURIComponent(phone);if(cls)u+=(phone?"&":"?")+"class_name="+encodeURIComponent(cls);
  const r=await fetch(u,{method:"PUT",headers:{Authorization:"Bearer "+getToken()}});
  if(r.ok){alert("更新成功!");closeModal("profile-modal");init();}else{const d=await r.json();alert(d.detail||"失败");}
}

function openPwdModal(){document.getElementById("pwd-old").value="";document.getElementById("pwd-new").value="";document.getElementById("pwd-error").style.display="none";openModal("pwd-modal");}
async function changePassword(){
  const o=document.getElementById("pwd-old").value,n=document.getElementById("pwd-new").value,e=document.getElementById("pwd-error");
  if(!o||!n){e.textContent="请填写完整";e.style.display="block";return}
  const r=await fetch(`/api/student/change-password?old_password=${encodeURIComponent(o)}&new_password=${encodeURIComponent(n)}`,{method:"PUT",headers:{Authorization:"Bearer "+getToken()}});
  if(r.ok){alert("密码修改成功!");closeModal("pwd-modal");}else{const d=await r.json();e.textContent=d.detail||"失败";e.style.display="block";}
}
</script>
</body>
</html>
