<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学生首页 — 图书借阅管理系统</title>
<link rel="stylesheet" href="style.css">
<style>
.profile-card { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
.profile-avatar { width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,#4a90d9,#6db3f2); color:#fff; display:flex; align-items:center; justify-content:center; font-size:24px; }
.book-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
.book-card { background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.06); padding:16px; cursor:pointer; transition:all .2s; display:flex; flex-direction:column; }
.book-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.12); transform:translateY(-2px); }
.book-card .book-cover { height:120px; background:linear-gradient(135deg,#e8f0fe,#d4e4fd); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:40px; margin-bottom:10px; }
.book-card .book-title { font-weight:700; font-size:14px; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.book-card .book-meta { font-size:11px; color:#6b8299; }
.book-card .book-stock { margin-top:6px; }
.book-card.out-of-stock { opacity:0.55; }
.ann-item { padding:10px 0; border-bottom:1px solid #f0f0f0; cursor:pointer; }
.ann-item:last-child { border-bottom:none; }
.ann-item:hover { color:#4a90d9; }
.ann-title { font-weight:600; font-size:14px; }
.ann-preview { font-size:12px; color:#999; margin-top:2px; }
.ann-date { font-size:11px; color:#bbb; }
.tab-nav { display:flex; gap:0; margin-bottom:16px; background:#f0f4f8; border-radius:8px; padding:4px; }
.tab-btn { flex:1; text-align:center; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:600; font-size:13px; border:none; background:transparent; color:#6b8299; transition:all .2s; }
.tab-btn.active { background:#fff; color:#4a90d9; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">📚 图书借阅管理系统 · 学生端</div>
  <div class="user-info">
    <span>👤 <span id="display-name">学生</span></span>
    <span style="cursor:pointer;color:#fff;font-size:12px;text-decoration:underline;" onclick="openProfileModal()">编辑资料</span>
    <span class="changepw-btn" onclick="openPwdModal()" style="cursor:pointer;font-size:12px;color:#fff;margin-left:6px;text-decoration:underline;">🔑 改密</span>
    <button onclick="logout()">退出登录</button>
  </div>
</div>
<div class="sidebar">
  <div class="nav-group"><div class="nav-label">主菜单</div>
    <a href="student_index.html" class="active"><span class="icon">📊</span><span>我的首页</span></a></div>
  <div class="nav-group"><div class="nav-label">我的记录</div>
    <a href="student_my_borrow.html"><span class="icon">📖</span><span>我的借阅</span></a>
    <a href="student_my_login_log.html"><span class="icon">📝</span><span>我的登录日志</span></a></div>
</div>
<div class="main-content">
  <div class="breadcrumb">🏠 学生首页</div>

  <!-- 看板卡片 -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-value" id="stat-books">-</div><div class="stat-label">馆藏图书</div></div>
    <div class="stat-card warning"><div class="stat-value" id="stat-active">-</div><div class="stat-label">当前未归还</div></div>
    <div class="stat-card success"><div class="stat-value" id="stat-total">-</div><div class="stat-label">历史借阅</div></div>
    <div class="stat-card danger"><div class="stat-value" id="stat-overdue">-</div><div class="stat-label">逾期数量</div></div>
  </div>

  <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;">
    <!-- 左列 -->
    <div>
      <!-- Tab 切换：图书浏览 / 公告 -->
      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('books')">📖 图书浏览</button>
        <button class="tab-btn" onclick="switchTab('announcements')">📢 公告</button>
      </div>

      <!-- 图书浏览面板 -->
      <div id="tab-books">
        <div class="toolbar" style="margin-bottom:12px;">
          <input type="text" id="book-search" placeholder="🔍 搜索书名/作者...">
          <select id="book-category"><option value="">全部分类</option></select>
          <button class="btn btn-primary btn-sm" onclick="loadBooks()">搜索</button>
        </div>
        <div class="book-grid" id="book-grid"></div>
        <div id="book-empty" class="empty-state" style="display:none;">未找到匹配图书</div>
        <div class="pagination" id="book-pagination"></div>
      </div>

      <!-- 公告面板 -->
      <div id="tab-announcements" style="display:none;">
        <div class="card"><div id="ann-list"></div></div>
      </div>
    </div>

    <!-- 右列 -->
    <div>
      <div class="card">
        <div class="card-title">👤 我的信息</div>
        <div id="profile-info"></div>
      </div>
      <div class="card">
        <div class="card-title">🔥 热门图书 Top 5</div>
        <div id="hot-books"></div>
      </div>
    </div>
  </div>
</div>

<!-- 借书确认弹窗 -->
<div class="modal-overlay" id="borrow-confirm-modal">
  <div class="modal">
    <div class="modal-header">📖 确认借书<button class="modal-close" onclick="closeModal('borrow-confirm-modal')">&times;</button></div>
    <div class="modal-body">
      <p>确认借阅 <strong id="borrow-book-title"></strong> ?</p>
      <p style="font-size:12px;color:#6b8299;">作者: <span id="borrow-book-author"></span></p>
      <div id="borrow-confirm-error" class="login-error"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('borrow-confirm-modal')">取消</button>
      <button class="btn btn-primary" onclick="confirmBorrow()">确认借书</button>
    </div>
  </div>
</div>

<!-- 个人资料编辑弹窗 -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal">
    <div class="modal-header">✏️ 编辑个人资料<button class="modal-close" onclick="closeModal('profile-modal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>手机号</label><input type="text" id="prof-phone"></div>
      <div class="form-group"><label>班级</label><input type="text" id="prof-class"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('profile-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveProfile()">保存</button>
    </div>
  </div>
</div>

<!-- 修改密码弹窗 -->
<div class="modal-overlay" id="pwd-modal">
  <div class="modal">
    <div class="modal-header">🔑 修改密码<button class="modal-close" onclick="closeModal('pwd-modal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>原密码</label><input type="password" id="pwd-old"></div>
      <div class="form-group"><label>新密码</label><input type="password" id="pwd-new"></div>
      <div id="pwd-error" class="login-error"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('pwd-modal')">取消</button>
      <button class="btn btn-primary" onclick="changePassword()">确认修改</button>
    </div>
  </div>
</div>

<!-- 公告详情弹窗 -->
<div class="modal-overlay" id="ann-detail-modal">
  <div class="modal" style="width:560px;">
    <div class="modal-header"><span id="ann-detail-title"></span><button class="modal-close" onclick="closeModal('ann-detail-modal')">&times;</button></div>
    <div class="modal-body"><div id="ann-detail-content"></div></div>
  </div>
</div>

<script src="app.js"></script>
<script>
const user = checkAuth();
if (!user || user.role !== "student") { alert("仅学生可访问"); window.location.href = "login.html"; }
displayUserInfo();

let currentBookPage = 1, pendingBookId = null, pendingBookName = null;

// ============ 初始化 ============
async function init() {
  const data = await apiGet("/api/student/dashboard");
  if (!data) return;
  document.getElementById("stat-books").textContent = data.total_books;
  document.getElementById("stat-active").textContent = data.active_borrows;
  document.getElementById("stat-total").textContent = data.total_borrows;
  document.getElementById("stat-overdue").textContent = data.overdue_count;

  // 个人信息
  const pf = await apiGet("/api/student/profile");
  if (pf) {
    document.getElementById("profile-info").innerHTML = `
      <div class="profile-card">
        <div class="profile-avatar">${(pf.name||pf.username||"?").charAt(0)}</div>
        <div>
          <div style="font-weight:700;font-size:15px;">${pf.name||pf.username}</div>
          <div style="font-size:12px;color:#6b8299;">${pf.reader?.class||"未设置班级"} · ${pf.reader?.phone||"未设置手机"}</div>
        </div>
      </div>`;
    // 预填编辑弹窗
    document.getElementById("prof-phone").value = pf.reader?.phone||"";
    document.getElementById("prof-class").value = pf.reader?.class||"";
  }

  // 热门图书
  (data.hot_books||[]).forEach((b,i) => {
    document.getElementById("hot-books").innerHTML += `<div class="hot-book-item"><span>${i+1}. <strong>${b.book_name}</strong></span><span style="color:#4a90d9;">${b.total_borrows}次</span></div>`;
  });

  // 公告预览
  const anns = data.announcements||[];
  document.getElementById("ann-list").innerHTML = anns.map(a =>
    `<div class="ann-item" onclick="openAnnDetail(${a.id})"><div class="ann-title">${a.title}</div><div class="ann-preview">${a.content}</div><div class="ann-date">${(a.create_time||"").slice(0,10)}</div></div>`
  ).join("") || '<span class="empty-state">暂无公告</span>';

  // 分类下拉
  const cats = await apiGet("/api/student/categories");
  if (cats) cats.forEach(c => { document.getElementById("book-category").innerHTML += `<option value="${c.name}">${c.name} (${c.count})</option>`; });

  loadBooks();
}
init();

// ============ Tab 切换 ============
function switchTab(tab) {
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById("tab-books").style.display = tab==="books"?"block":"none";
  document.getElementById("tab-announcements").style.display = tab==="announcements"?"block":"none";
}

// ============ 图书浏览 ============
function loadBooks(page=1) {
  currentBookPage = page;
  const kw = document.getElementById("book-search").value.trim();
  const cat = document.getElementById("book-category").value;
  let url = `/api/student/books?page=${page}&page_size=12`;
  if (kw) url += `&keyword=${encodeURIComponent(kw)}`;
  if (cat) url += `&category=${encodeURIComponent(cat)}`;

  apiGet(url).then(data => {
    if (!data) return;
    const grid = document.getElementById("book-grid");
    const empty = document.getElementById("book-empty");
    if (!data.items||data.items.length===0) { grid.innerHTML=""; empty.style.display="block"; }
    else {
      empty.style.display="none";
      grid.innerHTML = data.items.map(b => `
        <div class="book-card ${b.stock<=0?'out-of-stock':''}" onclick="${b.stock>0?`openBorrowConfirm(${b.id},'${b.book_name.replace(/'/g,"\\'")}','${(b.author||"").replace(/'/g,"\\'")}')`:''}">
          <div class="book-cover">📘</div>
          <div class="book-title">${b.book_name}</div>
          <div class="book-meta">${b.author} · ${b.category||"未分类"}</div>
          <div class="book-stock"><span class="tag ${b.stock>3?'tag-green':b.stock>0?'tag-yellow':'tag-red'}">${b.stock>0?`库存 ${b.stock}`:'已借完'}</span> <span style="font-size:10px;color:#999;">借阅${b.total_borrows}次</span></div>
        </div>`).join("");
    }
    renderPagination("book-pagination", data.page, data.total_pages, loadBooks);
  });
}

// ============ 借书 ============
function openBorrowConfirm(id, name, author) {
  pendingBookId = id; pendingBookName = name;
  document.getElementById("borrow-book-title").textContent = name;
  document.getElementById("borrow-book-author").textContent = author;
  document.getElementById("borrow-confirm-error").style.display = "none";
  openModal("borrow-confirm-modal");
}

async function confirmBorrow() {
  const result = await apiPost("/api/student/borrows", {book_id:pendingBookId,reader_id:0});
  if (!result) return;
  if (result.id) {
    alert(`借书成功！《${result.book_name}》`);
    closeModal("borrow-confirm-modal");
    loadBooks(currentBookPage);
    init(); // 刷新看板
  } else {
    const err = document.getElementById("borrow-confirm-error");
    err.textContent = typeof result.detail==='string'?result.detail:JSON.stringify(result.detail);
    err.style.display = "block";
  }
}

// ============ 公告详情 ============
async function openAnnDetail(id) {
  const data = await apiGet(`/api/student/announcements/${id}`);
  if (!data) return;
  document.getElementById("ann-detail-title").textContent = data.title;
  document.getElementById("ann-detail-content").innerHTML = `<p style="white-space:pre-wrap;">${data.content}</p><p style="color:#999;font-size:12px;margin-top:12px;">发布人: ${data.publisher_name||"-"} · ${(data.create_time||"").slice(0,10)}</p>`;
  openModal("ann-detail-modal");
}

// ============ 个人资料 ============
function openProfileModal() { openModal("profile-modal"); }

async function saveProfile() {
  const phone = document.getElementById("prof-phone").value.trim();
  const cls = document.getElementById("prof-class").value.trim();
  let url = "/api/student/profile";
  if (phone) url += `?phone=${encodeURIComponent(phone)}`;
  if (cls) url += `${phone?'&':'?'}class_name=${encodeURIComponent(cls)}`;
  const res = await fetch(url, {method:"PUT", headers:{Authorization:"Bearer "+getToken()}});
  if (res.ok) { alert("资料更新成功！"); closeModal("profile-modal"); init(); }
  else { const d=await res.json(); alert(d.detail||"更新失败"); }
}

// ============ 密码修改 ============
function openPwdModal() {
  document.getElementById("pwd-old").value="";
  document.getElementById("pwd-new").value="";
  document.getElementById("pwd-error").style.display="none";
  openModal("pwd-modal");
}

async function changePassword() {
  const oldPwd = document.getElementById("pwd-old").value;
  const newPwd = document.getElementById("pwd-new").value;
  const err = document.getElementById("pwd-error");
  if (!oldPwd||!newPwd) { err.textContent="请填写完整"; err.style.display="block"; return; }
  const res = await fetch(`/api/student/change-password?old_password=${encodeURIComponent(oldPwd)}&new_password=${encodeURIComponent(newPwd)}`, {method:"PUT", headers:{Authorization:"Bearer "+getToken()}});
  if (res.ok) { alert("密码修改成功！"); closeModal("pwd-modal"); }
  else { const d=await res.json(); err.textContent=d.detail||"修改失败"; err.style.display="block"; }
}
</script>
</body>
</html>
