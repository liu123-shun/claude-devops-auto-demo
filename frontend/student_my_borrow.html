<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的借阅 — 学生端</title>
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<div class="topbar">
  <div class="logo">📚 图书借阅管理系统 · 学生端</div>
  <div class="user-info">
    <span>👤 <span id="display-name">学生</span></span>
    <button onclick="logout()">退出登录</button>
  </div>
</div>

<div class="sidebar" id="sidebar"></div>
<div class="main-content">
  <div class="breadcrumb">🏠 学生首页 / 我的借阅</div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;">
      <div class="toolbar" style="margin-bottom:0;">
        <select id="filter-status">
          <option value="">全部状态</option>
          <option value="borrowed">未归还</option>
          <option value="returned">已归还</option>
          <option value="overdue">逾期</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="loadBorrows()">筛选</button>
      </div>
      <button class="btn btn-primary" onclick="openBorrowModal()">＋ 借书</button><button class="btn btn-outline btn-sm" onclick="exportMyBorrowsCSV()" style="margin-left:8px;">📥 导出CSV</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>图书名称</th><th>借阅时间</th><th>归还时间</th><th>状态</th><th>操作</th></tr>
        </thead>
        <tbody id="borrow-tbody"></tbody>
      </table>
    </div>
    <div id="empty-state" class="empty-state" style="display:none;">暂无借阅记录</div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- 借书弹窗 -->
<div class="modal-overlay" id="borrow-modal">
  <div class="modal">
    <div class="modal-header">📖 申请借书<button class="modal-close" onclick="closeModal('borrow-modal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label>搜索图书</label>
        <input type="text" id="borrow-book-search" placeholder="输入书名或作者进行搜索..." oninput="searchBorrowBooks()">
      </div>
      <div class="form-group">
        <label>选择图书</label>
        <select id="borrow-book-select">
          <option value="">-- 请选择要借的图书 --</option>
        </select>
      </div>
      <div id="borrow-stock-info" style="font-size:12px;color:#6b8299;margin-top:-6px;"></div>
      <div id="borrow-error" class="login-error"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('borrow-modal')">取消</button>
      <button class="btn btn-primary" id="borrow-submit-btn" onclick="submitBorrow()">确认借书</button>
    </div>
  </div>
</div>

<script src="app.js?v=3"></script>
<script>
const user = checkAuth();
if (!user || user.role !== "student") { alert("仅学生可访问"); window.location.href = "login.html"; }
displayUserInfo();
renderSidebar("student");
var allMyBorrowsData = [];
var allMyBorrowsData = [];

let availableBooks = [];

// ---- 借阅列表（带状态筛选） ----
function loadBorrows(page = 1) {
  const status = document.getElementById("filter-status").value;
  let url = `/api/student/borrows?page=${page}&page_size=10`;
  if (status) url += `&status=${encodeURIComponent(status)}`;

  apiGet(url).then(data => {
    allMyBorrowsData = (data.items || []);
  allMyBorrowsData = (data.items || []);
    if (!data) return;
    const tbody = document.getElementById("borrow-tbody");
    const empty = document.getElementById("empty-state");
    if (!data.items || data.items.length === 0) {
      tbody.innerHTML = ""; empty.style.display = "block";
    } else {
      empty.style.display = "none";
      const now = new Date();
      tbody.innerHTML = data.items.map(r => {
        let status = r.status;
        let isOverdue = false;
        if (!r.return_time && r.borrow_time) {
          const days = Math.floor((now - new Date(r.borrow_time)) / (1000 * 60 * 60 * 24));
          if (days >= 30) { status = "overdue"; isOverdue = true; }
        }
        const canReturn = !r.return_time;
        return `
        <tr style="${isOverdue ? 'background:#fff5f5;' : ''}">
          <td>${r.id}</td>
          <td><strong>${r.book_name || "-"}</strong></td>
          <td>${r.borrow_time ? r.borrow_time.replace("T"," ").slice(0,19) : "-"}</td>
          <td>${r.return_time ? r.return_time.replace("T"," ").slice(0,19) : "-"}</td>
          <td>${statusTag(status)}</td>
          <td>${canReturn ? '<button class="btn btn-success btn-sm" onclick="returnBook(' + r.id + ')">📥 还书</button>' : '-'}</td>
        </tr>`;
      }).join("");
    }
    renderPagination("pagination", data.page, data.total_pages, loadBorrows);
  });
}

// ---- 还书 ----
async function returnBook(borrowId) {
  if (!confirm("确定归还该图书吗？")) return;
  const result = await apiPut(`/api/student/borrows/${borrowId}/return`);
  if (!result) return;
  if (result.id) {
    alert("还书成功！");
    loadBorrows(1);
  } else if (result.detail) {
    alert(result.detail);
  }
}

// ---- 搜索借阅用书 ----
async function searchBorrowBooks() {
  const keyword = document.getElementById("borrow-book-search").value.trim();
  const select = document.getElementById("borrow-book-select");
  const info = document.getElementById("borrow-stock-info");
  info.textContent = "";

  let url = "/api/student/books";
  if (keyword) url += `?keyword=${encodeURIComponent(keyword)}`;

  const data = await apiGet(url);
  select.innerHTML = '<option value="">-- 请选择要借的图书 --</option>';
  if (!data || !data.items || data.items.length === 0) {
    select.innerHTML = '<option value="">未找到匹配图书</option>';
    availableBooks = [];
    return;
  }
  availableBooks = data.items;
  const available = availableBooks.filter(b => b.stock > 0);
  const unavailable = availableBooks.filter(b => b.stock <= 0);
  if (available.length === 0) {
    select.innerHTML = '<option value="">所有匹配图书均已借出</option>';
  } else {
    available.forEach(b => {
      select.innerHTML += `<option value="${b.id}">${b.book_name} — ${b.author} (库存:${b.stock})</option>`;
    });
  }
  unavailable.forEach(b => {
    select.innerHTML += `<option value="${b.id}" disabled style="color:#999;">${b.book_name} — ${b.author} (已借完)</option>`;
  });
  document.getElementById("borrow-error").style.display = "none";
}

// ---- 打开借书弹窗 ----
async function openBorrowModal() {
  document.getElementById("borrow-book-search").value = "";
  document.getElementById("borrow-error").style.display = "none";
  document.getElementById("borrow-submit-btn").disabled = false;
  await searchBorrowBooks();
  const select = document.getElementById("borrow-book-select");
  select.onchange = function() {
    const info = document.getElementById("borrow-stock-info");
    info.textContent = "";
    const selId = parseInt(select.value);
    const book = availableBooks.find(b => b.id === selId);
    if (book) {
      if (book.stock <= 0) {
        info.textContent = "⚠️ 该书已无库存，不可借阅";
        info.style.color = "#e74c3c";
        document.getElementById("borrow-submit-btn").disabled = true;
      } else {
        info.textContent = `📦 当前库存：${book.stock} 册`;
        info.style.color = "#27ae60";
        document.getElementById("borrow-submit-btn").disabled = false;
      }
    }
  };
  openModal("borrow-modal");
}

// ---- 提交借书 ----
async function submitBorrow() {
  const select = document.getElementById("borrow-book-select");
  const err = document.getElementById("borrow-error");
  err.style.display = "none";

  const bookId = parseInt(select.value);
  if (!bookId) {
    err.textContent = "请选择一本图书";
    err.style.display = "block";
    return;
  }
  const book = availableBooks.find(b => b.id === bookId);
  if (!book || book.stock <= 0) {
    err.textContent = "该书已无库存，无法借阅";
    err.style.display = "block";
    return;
  }

  const result = await apiPost("/api/student/borrows", { book_id: bookId, reader_id: 0 });
  if (!result) return;
  if (result.id) {
    alert(`借书成功！《${result.book_name}》已借出`);
    closeModal("borrow-modal");
    loadBorrows(1);
  } else if (result.detail) {
    err.textContent = typeof result.detail === 'string' ? result.detail : JSON.stringify(result.detail);
    err.style.display = "block";
  }
}

loadBorrows();

function exportMyBorrowsCSV() {
    if (!allMyBorrowsData.length) { alert("暂无数据可导出"); return; }
    exportCSV("我的借阅", ["ID","图书","借阅时间","归还时间","状态"],
        allMyBorrowsData.map(function(r){
            var s = r.status; if (!r.return_time && r.borrow_time) { var d = Math.floor((new Date()-new Date(r.borrow_time))/86400000); if (d>=30) s="逾期"; }
            return [r.id,r.book_name||"",(r.borrow_time||"").replace("T"," ").slice(0,19),(r.return_time||"").replace("T"," ").slice(0,19)||"未归还",s=="returned"?"已归还":s=="borrowed"?"未归还":"逾期"];
        }));
}
</script>
</body>
</html>
