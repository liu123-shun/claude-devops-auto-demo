<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的登录日志 — 学生端</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="logo">📚 图书借阅管理系统 · 学生端</div>
  <div class="user-info">
    <span>👤 <span id="display-name">学生</span></span>
    <button onclick="logout()">退出登录</button>
  </div>
</div>

<div class="sidebar">
  <div class="nav-group"><div class="nav-label">主菜单</div>
    <a href="student_index.html"><span class="icon">📊</span><span>我的首页</span></a>
    <a href="student_books.html"><span class="icon">📚</span><span>馆藏浏览</span></a></div>
  <div class="nav-group"><div class="nav-label">我的记录</div>
    <a href="student_my_borrow.html"><span class="icon">📖</span><span>我的借阅</span></a>
    <a href="student_stats.html"><span class="icon">📈</span><span>阅读统计</span></a>
    <a href="student_my_login_log.html" class="active"><span class="icon">📝</span><span>我的登录日志</span></a></div>
</div>

<div class="main-content">
  <div class="breadcrumb">🏠 学生首页 / 我的登录日志</div>

  <div class="card">
    <div class="toolbar" style="flex-wrap:wrap;">
      <div class="card-title" style="margin-bottom:0;">📝 我的登录日志</div>
      <input type="date" id="filter-date-from" title="登录时间 从">
      <span style="color:#6b8299;font-size:13px;">至</span>
      <input type="date" id="filter-date-to" title="登录时间 至">
      <button class="btn btn-primary btn-sm" onclick="loadLogs()">筛选</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('filter-date-from').value='';document.getElementById('filter-date-to').value='';loadLogs();">清除</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>登录IP</th><th>登录时间</th><th>退出时间</th></tr>
        </thead>
        <tbody id="log-tbody"></tbody>
      </table>
    </div>
    <div id="empty-state" class="empty-state" style="display:none;">暂无登录记录</div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
const user = checkAuth();
if (!user || user.role !== "student") { alert("仅学生可访问"); window.location.href = "login.html"; }
displayUserInfo();

function loadLogs(page = 1) {
  const dateFrom = document.getElementById("filter-date-from").value;
  const dateTo = document.getElementById("filter-date-to").value;
  apiGet(`/api/student/login-logs?page=${page}&page_size=10`).then(data => {
    if (!data) return;
    let items = data.items || [];
    if (dateFrom) {
      items = items.filter(l => l.login_time && l.login_time >= dateFrom + "T00:00:00");
    }
    if (dateTo) {
      items = items.filter(l => l.login_time && l.login_time <= dateTo + "T23:59:59");
    }
    const tbody = document.getElementById("log-tbody");
    const empty = document.getElementById("empty-state");
    if (items.length === 0) {
      tbody.innerHTML = ""; empty.style.display = "block";
    } else {
      empty.style.display = "none";
      tbody.innerHTML = items.map(l => `
        <tr>
          <td>${l.id}</td>
          <td>${l.login_ip || "-"}</td>
          <td>${l.login_time ? l.login_time.replace("T"," ").slice(0,19) : "-"}</td>
          <td>${l.logout_time ? l.logout_time.replace("T"," ").slice(0,19) : '<span class="tag tag-yellow">在线</span>'}</td>
        </tr>`).join("");
    }
    const totalPages = Math.ceil(items.length / 10) || 0;
    renderPagination("pagination", page, totalPages, loadLogs);
  });
}

loadLogs();
</script>
</body>
</html>
